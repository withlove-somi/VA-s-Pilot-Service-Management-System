        <div class="p-6 border-b border-white/10 flex items-center gap-2">

        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">

                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" /></svg>
                <span class="font-semibold tracking-wide text-sm">Dashboard</span>

                <span class="font-medium tracking-wide text-sm">Inbox</span>

        <div class="p-4 border-t border-white/10 mt-auto">
            <a href="admin-login.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:text-white hover:bg-red-500/20 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" /></svg>

  <main class="flex-1 h-full overflow-y-auto relative z-10 p-6 md:px-10">
    <div class="max-w-4xl w-full mx-auto py-6">
      <div class="mb-8">
        <a href="admin-inbox.html" class="w-10 h-10 rounded-full border border-white/10 hover:border-white/30 bg-white/5 hover:bg-white/10 flex items-center justify-center transition-colors" aria-label="Back to inbox">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15 18l-6-6 6-6"></path>
          </svg>
        </a>
      </div>

      <div id="profile-card" class="bg-black/40 backdrop-blur-md border border-white/10 rounded-2xl p-8 shadow-xl flex flex-col md:flex-row items-center md:items-start gap-8 mb-10 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-64 h-64 bg-brand-pink/5 rounded-full filter blur-[80px] pointer-events-none"></div>

        <div class="relative shrink-0">
          <div class="w-32 h-32 rounded-full bg-gradient-to-tr from-brand-pink to-brand-purple p-1 shadow-[0_0_30px_rgba(224,0,255,0.2)]">
            <div class="w-full h-full bg-[#150723] rounded-full flex items-center justify-center text-4xl font-bold text-white border-4 border-black/50 overflow-hidden relative">
              <img id="user-avatar" alt="Customer profile photo" class="hidden w-full h-full object-cover">
              <span id="user-initials">CU</span>
            </div>
          </div>
        </div>

        <div class="flex-1 text-center md:text-left z-10 w-full">
          <div class="flex flex-col md:flex-row items-center md:items-start justify-between gap-4 mb-2">
            <div>
              <div class="flex flex-col md:flex-row items-center gap-3 mb-1">
                <h2 id="user-name" class="text-3xl font-bold text-white tracking-tight">Customer</h2>
                <span id="verification-status" class="px-3 py-1 rounded border text-[10px] font-bold uppercase tracking-widest bg-red-500/5 text-red-400 border-red-500/20">
                  Unverified
                </span>
              </div>
              <p id="user-email" class="text-gray-400 text-sm">customer@example.com</p>
            </div>
          </div>

          <div class="mt-8 flex flex-wrap justify-center md:justify-start gap-4">
            <a id="chat-link" href="admin-chat.html" class="px-6 py-2.5 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10 text-white transition-all font-semibold text-sm flex items-center gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 8.25v5.25a2.25 2.25 0 01-2.25 2.25H8.25L3 21V8.25A2.25 2.25 0 015.25 6h14.25a2.25 2.25 0 012.25 2.25z" /></svg>
              Open Chat
            </a>
            <button id="verification-btn" type="button" class="px-6 py-2.5 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10 text-white transition-all font-semibold text-sm flex items-center gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.6" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" /></svg>
              Verification Details
            </button>
          </div>
        </div>
        <button id="admin-actions-btn" type="button" class="absolute bottom-4 right-4 w-10 h-10 rounded-full border border-white/10 hover:border-white/30 bg-white/5 hover:bg-white/10 flex items-center justify-center transition-colors" aria-label="Admin actions">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <circle cx="5" cy="12" r="1.8"></circle>
            <circle cx="12" cy="12" r="1.8"></circle>
            <circle cx="19" cy="12" r="1.8"></circle>
          </svg>
        </button>
      </div>

      <div>
        <h3 class="text-xl font-bold mb-6 text-white border-b border-white/10 pb-4 flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-brand-pink"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
          Transaction History
        </h3>
        <div id="transactions-container" class="space-y-4"></div>
      </div>
    </div>
  </main>

  <div id="verification-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 backdrop-blur-sm p-4">
    <div class="w-full max-w-2xl bg-[#150723] border border-white/10 rounded-2xl p-6 max-h-[90vh] overflow-y-auto relative">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-xl font-bold">Verification Details</h3>
        <button type="button" id="verification-close" class="text-gray-400 hover:text-white text-sm">Close</button>
      </div>
      <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
        <p class="text-xs text-gray-400">Admins can revoke verification if the documents are invalid or expired.</p>
        <button type="button" id="revoke-verify" class="px-4 py-2 rounded-lg bg-red-500/15 hover:bg-red-500/25 border border-red-500/40 text-red-200 text-xs font-semibold">Revoke Verification</button>
      </div>
      <div id="verification-details"></div>
    </div>
  </div>

  <div id="admin-actions-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 backdrop-blur-sm p-4">
    <div class="w-full max-w-xl bg-[#150723] border border-white/10 rounded-2xl p-6 max-h-[90vh] overflow-y-auto relative">
      <div class="mb-4">
        <h3 class="text-xl font-bold">Account Actions</h3>
      </div>
      <div id="admin-actions-content"></div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://127.0.0.1:5000';
    const params = new URLSearchParams(window.location.search);
    const email = String(params.get('email') || '').trim().toLowerCase();
    let isVerified = false;
    let adminState = { warningLevel: 0, banned: false };

    document.getElementById('chat-link').href = `admin-chat.html?email=${encodeURIComponent(email)}`;

    async function apiJson(path, options = {}) {
      const response = await fetch(`${API_BASE}${path}`, {
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        ...options
      });
      let data = {};
      try {
        data = await response.json();
      } catch (e) {
        data = {};
      }
      if (!response.ok || data.ok === false) {
        throw new Error(data.error || `Request failed (${response.status})`);
      }
      return data;
    }

    function updateVerificationStatus(verified) {
      isVerified = Boolean(verified);
      const statusEl = document.getElementById('verification-status');
      const revokeBtn = document.getElementById('revoke-verify');
      if (isVerified) {
        statusEl.textContent = 'Verified';
        statusEl.className = 'px-3 py-1 rounded border text-[10px] font-bold uppercase tracking-widest bg-green-500/10 text-green-400 border-green-500/20';
        revokeBtn.classList.remove('opacity-40', 'pointer-events-none');
      } else {
        statusEl.textContent = 'Unverified';
        statusEl.className = 'px-3 py-1 rounded border text-[10px] font-bold uppercase tracking-widest bg-red-500/5 text-red-400 border-red-500/20';
        revokeBtn.classList.add('opacity-40', 'pointer-events-none');
      }
    }

    async function loadProfile() {
      const profileCard = document.getElementById('profile-card');
      const verificationDetails = document.getElementById('verification-details');
      const nameEl = document.getElementById('user-name');
      const emailEl = document.getElementById('user-email');
      const initialsEl = document.getElementById('user-initials');
      const avatarEl = document.getElementById('user-avatar');
      const verificationBtn = document.getElementById('verification-btn');

      let user = null;
      let userOrders = [];
      let approved = null;

      try {
        const [userPayload, ordersPayload, verificationPayload] = await Promise.all([
          apiJson(`/api/users/${encodeURIComponent(email)}`),
          apiJson(`/api/orders?customerEmail=${encodeURIComponent(email)}`),
          apiJson(`/api/verifications?userEmail=${encodeURIComponent(email)}&status=Approved`)
        ]);
        user = userPayload.user || null;
        userOrders = ordersPayload.orders || [];
        const approvedList = (verificationPayload.requests || []).sort(
          (a, b) => new Date(b.updatedAt || b.createdAt || 0) - new Date(a.updatedAt || a.createdAt || 0)
        );
        approved = approvedList[0] || null;
      } catch (err) {
        profileCard.innerHTML = `<p class="text-red-300">Unable to load customer profile: ${err.message || 'Request failed'}</p>`;
        verificationDetails.innerHTML = '<p class="text-gray-400">No approved verification request found for this customer.</p>';
        document.getElementById('transactions-container').innerHTML = `
          <div class="bg-white/5 border border-white/10 rounded-xl p-8 text-center">
            <p class="text-gray-500 text-sm">No past transactions found.</p>
          </div>
        `;
        return;
      }

      if (!user) {
        profileCard.innerHTML = '<p class="text-gray-400">Customer not found.</p>';
        verificationDetails.innerHTML = '<p class="text-gray-400">No approved verification request found for this customer.</p>';
        document.getElementById('transactions-container').innerHTML = `
          <div class="bg-white/5 border border-white/10 rounded-xl p-8 text-center">
            <p class="text-gray-500 text-sm">No past transactions found.</p>
          </div>
        `;
        return;
      }

      const displayName = user.fullname || user.name || 'Customer';
      nameEl.textContent = displayName;
      emailEl.textContent = user.email || 'N/A';
      initialsEl.textContent = displayName
        .split(' ')
        .filter(Boolean)
        .slice(0, 2)
        .map((part) => part[0].toUpperCase())
        .join('') || 'CU';
      if (user.profileImage) {
        avatarEl.src = user.profileImage;
        avatarEl.classList.remove('hidden');
        initialsEl.classList.add('hidden');
      } else {
        avatarEl.removeAttribute('src');
        avatarEl.classList.add('hidden');
        initialsEl.classList.remove('hidden');
      }

      updateVerificationStatus(user.verified);
      adminState = {
        warningLevel: Number(user.warningLevel || 0),
        banned: Boolean(user.banned)
      };

      if (!approved) {
        verificationDetails.innerHTML = '<p class="text-gray-400">No approved verification request found for this customer.</p>';
        verificationBtn.classList.add('opacity-40', 'pointer-events-none');
      } else {
        verificationDetails.innerHTML = `
          <div class="bg-black/40 backdrop-blur-md border border-white/10 rounded-xl p-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3 text-sm mb-4">
              <div class="bg-white/5 border border-white/10 rounded-lg p-3"><div class="text-gray-500 text-xs">Phone</div><div>${approved.phoneNumber || 'N/A'}</div></div>
              <div class="bg-white/5 border border-white/10 rounded-lg p-3"><div class="text-gray-500 text-xs">ID Type</div><div>${approved.govIdType || 'N/A'}</div></div>
              <div class="bg-white/5 border border-white/10 rounded-lg p-3"><div class="text-gray-500 text-xs">ID Number</div><div>${approved.govIdNumber || 'N/A'}</div></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
              <img src="${approved.govIdPhoto || ''}" alt="ID" class="w-full h-56 object-cover rounded-lg border border-white/10 bg-black/20" />
              <img src="${approved.selfieWithId || ''}" alt="Selfie" class="w-full h-56 object-cover rounded-lg border border-white/10 bg-black/20" />
            </div>
          </div>
        `;
        verificationBtn.classList.remove('opacity-40', 'pointer-events-none');
      }

      renderTransactions(userOrders);
    }

    function renderTransactions(orders) {
      const container = document.getElementById('transactions-container');
      const terminalStates = ['Completed', 'Cancelled', 'Declined', 'Disapproved'];
      const historyOrders = (orders || []).filter((order) => terminalStates.includes(order.status));

      if (!historyOrders.length) {
        container.innerHTML = `
          <div class="bg-white/5 border border-white/10 rounded-xl p-8 text-center">
            <p class="text-gray-500 text-sm">No past transactions found.</p>
          </div>`;
        return;
      }

      container.innerHTML = '';
      historyOrders.reverse().forEach((order) => {
        const badgeStyle = order.status === 'Completed'
          ? "bg-green-500/10 text-green-400 border-green-500/20"
          : "bg-red-500/10 text-red-400 border-red-500/20";

        const card = document.createElement('div');
        card.className = "bg-black/40 backdrop-blur-md border border-white/10 rounded-xl p-5 flex flex-col md:flex-row justify-between items-center gap-4 transition-all hover:border-white/20";
        card.innerHTML = `
          <div class="flex items-center gap-4 w-full md:w-auto">
            <div class="w-12 h-12 rounded-lg bg-white/5 border border-white/10 flex items-center justify-center shrink-0">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z" /></svg>
            </div>
            <div>
              <div class="flex items-center gap-3">
                <h4 class="font-bold text-white">${order.game || 'Boost Service'}</h4>
                <span class="px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-widest border ${badgeStyle}">${order.status}</span>
              </div>
              <p class="text-xs text-gray-500 mt-1">Order ID: <span class="text-gray-400">${order.id}</span> • Date: ${order.date || '-'}</p>
            </div>
          </div>
          <div class="w-full md:w-auto text-left md:text-right flex flex-col justify-center">
            <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Amount</span>
            <span class="text-lg font-bold text-white">₱${order.totalPrice || '0.00'}</span>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function openVerificationModal() {
      const modal = document.getElementById('verification-modal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    function closeVerificationModal() {
      const modal = document.getElementById('verification-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    async function revokeVerification() {
      if (!email || !isVerified) return;
      try {
        await apiJson(`/api/users/${encodeURIComponent(email)}/verification`, {
          method: 'PATCH',
          body: JSON.stringify({ verified: false })
        });
        updateVerificationStatus(false);
      } catch (err) {
        alert(err.message || 'Unable to revoke verification.');
      }
    }

    let pendingAdminAction = null;

    function openAdminActionsModal() {
      const modal = document.getElementById('admin-actions-modal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
      renderAdminActions('choose');
    }

    function closeAdminActionsModal() {
      const modal = document.getElementById('admin-actions-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
      pendingAdminAction = null;
    }

    function getWarningMeta(level) {
      if (level === 1) {
        return { label: '1st Warning', color: 'text-white', border: 'border-white/30', bg: 'bg-white/10' };
      }
      if (level === 2) {
        return { label: '2nd Warning', color: 'text-yellow-300', border: 'border-yellow-500/30', bg: 'bg-yellow-500/10' };
      }
      return { label: '3rd Warning', color: 'text-red-300', border: 'border-red-500/30', bg: 'bg-red-500/10' };
    }

    function renderAdminActions(step) {
      const content = document.getElementById('admin-actions-content');
      const warningLevel = adminState.warningLevel || 0;

      if (adminState.banned) {
        content.innerHTML = '<p class="text-sm text-gray-300">This user is already banned.</p>';
        return;
      }

      if (step === 'confirm' && pendingAdminAction) {
        const actionText = pendingAdminAction.type === 'ban' ? 'ban' : 'flag';
        content.innerHTML = `
          <div class="text-center">
            <p class="text-lg font-semibold mb-6">Are you sure you want to ${actionText} this user?</p>
            <div class="flex items-center justify-center gap-4">
              <button type="button" id="admin-action-cancel" class="px-6 py-3 rounded-xl bg-white/5 border border-white/10 text-sm font-semibold">Cancel</button>
              <button type="button" id="admin-action-confirm" class="px-6 py-3 rounded-xl bg-brand-purple/20 border border-brand-purple/40 text-sm font-semibold">Yes</button>
            </div>
          </div>
        `;
        document.getElementById('admin-action-cancel').addEventListener('click', closeAdminActionsModal);
        document.getElementById('admin-action-confirm').addEventListener('click', () => renderAdminActions('reason'));
        return;
      }

      if (step === 'reason' && pendingAdminAction) {
        const actionText = pendingAdminAction.type === 'ban' ? 'ban' : 'flag';
        content.innerHTML = `
          <p class="text-sm text-gray-300 mb-3 text-center">Please enter the reason to ${actionText} this user.</p>
          <textarea id="admin-action-reason" rows="4" class="w-full bg-black/40 border border-white/10 rounded-lg px-3 py-2 text-sm text-white mb-3" placeholder="Enter reason..."></textarea>
          <p id="admin-action-error" class="text-xs text-red-400 hidden mb-3 text-center">Reason is required.</p>
          <div class="flex items-center justify-center gap-4">
            <button type="button" id="admin-action-cancel" class="px-6 py-3 rounded-xl bg-white/5 border border-white/10 text-sm font-semibold">Cancel</button>
            <button type="button" id="admin-action-submit" class="px-6 py-3 rounded-xl bg-brand-purple/20 border border-brand-purple/40 text-sm font-semibold">Submit</button>
          </div>
        `;
        document.getElementById('admin-action-cancel').addEventListener('click', closeAdminActionsModal);
        document.getElementById('admin-action-submit').addEventListener('click', () => {
          const reasonInput = document.getElementById('admin-action-reason');
          const errorEl = document.getElementById('admin-action-error');
          const reason = reasonInput.value.trim();
          if (!reason) {
            errorEl.classList.remove('hidden');
            return;
          }
          apiJson(`/api/users/${encodeURIComponent(email)}/admin-action`, {
            method: 'PATCH',
            body: JSON.stringify({ action: pendingAdminAction.type, reason })
          }).then((payload) => {
            const updatedUser = payload.user || {};
            adminState = {
              warningLevel: Number(updatedUser.warningLevel || 0),
              banned: Boolean(updatedUser.banned)
            };
            pendingAdminAction = null;
            if (adminState.banned) {
              content.innerHTML = '<p class="text-sm text-gray-300 text-center">User has been banned.</p>';
              return;
            }
            renderAdminActions('choose');
          }).catch((err) => {
            alert(err.message || 'Unable to update user.');
          });
        });
        return;
      }

      if (warningLevel >= 3) {
        content.innerHTML = `
          <p class="text-base text-gray-300 mb-6 text-center">3rd warning have been served, do you want to ban the user?</p>
          <div class="flex items-center justify-center gap-4">
            <button type="button" id="admin-ban-only" class="px-6 py-3 rounded-xl bg-red-500/15 border border-red-500/40 text-red-200 text-sm font-semibold flex items-center justify-center gap-2">
              Ban User
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M12 2l10 18H2L12 2zm0 7v4m0 4h.01"></path>
              </svg>
            </button>
          </div>
        `;
        document.getElementById('admin-ban-only').addEventListener('click', () => {
          pendingAdminAction = { type: 'ban' };
          renderAdminActions('confirm');
        });
        return;
      }

      const nextLevel = warningLevel + 1;
      const flagMeta = getWarningMeta(nextLevel);
      content.innerHTML = `
        <div class="grid gap-3">
          <button type="button" id="admin-flag-btn" class="px-4 py-2 rounded-lg ${flagMeta.bg} ${flagMeta.border} ${flagMeta.color} text-sm font-semibold flex items-center justify-between">
            Issue ${flagMeta.label}
            <svg class="w-5 h-5" viewBox="0 -960 960 960" fill="#e3e3e3" aria-hidden="true">
              <path d="M200-120v-680h360l16 80h224v400H520l-16-80H280v280h-80Zm300-440Zm86 160h134v-240H510l-16-80H280v240h290l16 80Z"></path>
            </svg>
          </button>
          <button type="button" id="admin-ban-btn" class="px-4 py-2 rounded-lg bg-red-500/15 border border-red-500/40 text-red-200 text-sm font-semibold flex items-center justify-between">
            Ban User
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 2l10 18H2L12 2zm0 7v4m0 4h.01"></path>
            </svg>
          </button>
        </div>
      `;
      document.getElementById('admin-flag-btn').addEventListener('click', () => {
        pendingAdminAction = { type: 'flag' };
        renderAdminActions('confirm');
      });
      document.getElementById('admin-ban-btn').addEventListener('click', () => {
        pendingAdminAction = { type: 'ban' };
        renderAdminActions('confirm');
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      const verificationBtn = document.getElementById('verification-btn');
      const verificationClose = document.getElementById('verification-close');
      const verificationModal = document.getElementById('verification-modal');
      const revokeBtn = document.getElementById('revoke-verify');
      const adminActionsBtn = document.getElementById('admin-actions-btn');
      const adminActionsModal = document.getElementById('admin-actions-modal');

      verificationBtn.addEventListener('click', openVerificationModal);
      verificationClose.addEventListener('click', closeVerificationModal);
      verificationModal.addEventListener('click', (event) => {
        if (event.target === verificationModal) closeVerificationModal();
      });
      revokeBtn.addEventListener('click', revokeVerification);
      adminActionsBtn.addEventListener('click', openAdminActionsModal);
      adminActionsModal.addEventListener('click', (event) => {
        if (event.target === adminActionsModal) closeAdminActionsModal();
      });

      loadProfile();
    });
  </script>
    <script src="sidebar-active.js"></script>
</body>
</html>
