<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | VA Pilot Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
                    },
                    colors: {
                        'brand-bg': '#0f0518',
                        'brand-pink': '#e000ff',
                        'brand-purple': '#7a00ff',
                    }
                }
            }
        }
    </script>
  <style>
    #page-loader {
      position: fixed;
      left: 50%;
      top: 24px;
      transform: translateX(-50%);
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 14px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      color: #1a1a1a;
      z-index: 9999;
    }
    #page-loader .spinner {
      width: 22px;
      height: 22px;
      border: 3px solid rgba(26, 26, 26, 0.2);
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: pageLoaderSpin 0.9s linear infinite;
    }
    #page-loader .label {
      font-size: 14px;
      letter-spacing: 0.2px;
    }
    #page-loader.hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    @keyframes pageLoaderSpin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body class="bg-brand-bg text-white font-sans antialiased selection:bg-brand-pink selection:text-white h-screen flex items-center justify-center relative overflow-hidden">

    <div class="absolute inset-0 bg-[linear-gradient(to_right,#ffffff05_1px,transparent_1px),linear-gradient(to_bottom,#ffffff05_1px,transparent_1px)] bg-[size:40px_40px] pointer-events-none z-0"></div>
    <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-red-500/10 rounded-full mix-blend-screen filter blur-[120px] pointer-events-none z-0 animate-pulse"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[400px] h-[400px] bg-brand-pink/10 rounded-full mix-blend-screen filter blur-[100px] pointer-events-none z-0"></div>

    <a href="../index.html" class="absolute top-8 left-8 z-20 text-gray-400 hover:text-brand-pink transition-colors flex items-center gap-2 text-sm font-medium">
        <span>←</span> Return to Base
    </a>

    <div class="w-full max-w-md relative z-10 px-6">
        
        <div class="bg-[#150723]/80 backdrop-blur-xl border border-white/10 p-10 rounded-3xl shadow-[0_0_50px_rgba(0,0,0,0.5)]">
            
            <div class="text-center mb-10">
                <div class="flex items-center justify-center gap-2 mb-4">
                    <span class="text-brand-pink text-3xl font-bold leading-none">VA</span>
                    <span class="text-white text-lg font-bold tracking-widest mt-1">ADMIN PORTAL</span>
                </div>
                <h1 class="text-2xl font-bold tracking-tight text-white mb-2">Master Override</h1>
                <p class="text-sm text-gray-400 mb-4">Welcome back to the command center. Please enter your master credentials to access the system.</p>
            </div>

            <form id="admin-login-form" class="space-y-6">
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-2 uppercase tracking-wider">Admin Email</label>
                    <div class="relative">
                        <input type="email" id="email" required placeholder="email" class="w-full bg-black/40 border border-white/10 rounded-xl pl-4 pr-10 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-brand-pink focus:ring-1 focus:ring-brand-pink transition-all">
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500">✉</span>
                    </div>
                </div>

                <div>
                  <div class="flex justify-between items-center mb-2">
                      <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider">Master Password</label>
                      </div>
                  <div class="relative">
                      <input type="password" id="passcode" required placeholder="••••••••••••" class="w-full bg-black/40 border border-white/10 rounded-xl pl-4 pr-10 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-brand-pink focus:ring-1 focus:ring-brand-pink transition-all">
                        
                      <button type="button" id="toggle-password" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white transition-colors focus:outline-none">
                          <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                          </svg>
                      </button>
                  </div>
                </div>

                <p id="error-msg" class="text-red-500 text-xs text-center hidden font-medium bg-red-500/10 py-2 rounded-lg border border-red-500/20"></p>

                <button type="submit" class="flex items-center justify-center block w-full bg-gradient-to-r from-red-600 to-brand-purple hover:from-red-500 hover:to-purple-500 text-white font-bold py-4 rounded-xl transition-all shadow-[0_0_15px_rgba(220,38,38,0.3)] hover:shadow-[0_0_25px_rgba(220,38,38,0.6)] hover:-translate-y-0.5 mt-4 tracking-widest text-sm">
                    SYSTEM OVERRIDE
                </button>
            </form>
            
            </div>
    </div>

    <script>
        // Password Toggle Logic
        const togglePasswordBtn = document.getElementById('toggle-password');
        const passcodeInput = document.getElementById('passcode');
        const eyeIcon = document.getElementById('eye-icon');

        togglePasswordBtn.addEventListener('click', () => {
            const isPassword = passcodeInput.getAttribute('type') === 'password';
            passcodeInput.setAttribute('type', isPassword ? 'text' : 'password');
            
            if (isPassword) {
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />`;
                togglePasswordBtn.classList.add('text-brand-pink');
                togglePasswordBtn.classList.remove('text-gray-500');
            } else {
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />`;
                togglePasswordBtn.classList.remove('text-brand-pink');
                togglePasswordBtn.classList.add('text-gray-500');
            }
        });

        // Hardcoded Admin Authentication Logic
        const adminLoginForm = document.getElementById('admin-login-form');
        const emailInput = document.getElementById('email');
        const errorMsg = document.getElementById('error-msg');

        // Master Credentials
        const ADMIN_EMAIL = "admin@vapilot.com";
        const ADMIN_PASS = "AdminAccess123!";

        adminLoginForm.addEventListener('submit', (e) => {
            e.preventDefault(); 
            
            const email = emailInput.value.trim();
            const password = passcodeInput.value;

            // Check against hardcoded credentials
            if (email === ADMIN_EMAIL && password === ADMIN_PASS) {
                // Success! Save admin session state and redirect
                localStorage.setItem('va_pilot_admin_logged_in', 'true');
                window.location.href = 'admin-dashboard.html';
            } else {
                // Fail! Show error
                errorMsg.textContent = "Security Breach Detected: Invalid Master Credentials.";
                errorMsg.classList.remove('hidden');
                
                // Shake effect for visual feedback
                adminLoginForm.classList.add('animate-pulse');
                setTimeout(() => adminLoginForm.classList.remove('animate-pulse'), 500);
            }
        });
    </script>
  <div id="page-loader" role="status" aria-live="polite" aria-busy="true">
    <div class="spinner" aria-hidden="true"></div>
    <span class="label">Loading...</span>
  </div>
  <script>
    window.addEventListener("load", function () {
      var loader = document.getElementById("page-loader");
      if (!loader) return;
      loader.classList.add("hidden");
      setTimeout(function () {
        if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
      }, 250);
    });
  </script>
</body>
</html>
