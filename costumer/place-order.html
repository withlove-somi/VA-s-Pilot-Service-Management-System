    <script>
        const API_BASE = 'https://va-s-pilot-service-management-system-production-d6a0.up.railway.app';
        async function apiJson(path, options = {}) {
            const response = await fetch(`${API_BASE}${path}`, {
                headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
                ...options
            });
            let data = {};
            try {
                data = await response.json();
            } catch (e) {
                data = {};
            }
            if (!response.ok || data.ok === false) {
                throw new Error(data.error || `Request failed (${response.status})`);
            }
            return data;
        }

        const currentUser = JSON.parse(localStorage.getItem('va_pilot_current_user'));
        if (!currentUser) {
            window.location.href = 'login.html';
        }

        const rankSystem = [
            { name: "Warrior", divs: ["III", "II", "I"], starsPerDiv: 3 },
            { name: "Elite", divs: ["IV", "III", "II", "I"], starsPerDiv: 4 },
            { name: "Master", divs: ["IV", "III", "II", "I"], starsPerDiv: 4 },
            { name: "Grandmaster", divs: ["V", "IV", "III", "II", "I"], starsPerDiv: 5 },
            { name: "Epic", divs: ["V", "IV", "III", "II", "I"], starsPerDiv: 5 },
            { name: "Legend", divs: ["V", "IV", "III", "II", "I"], starsPerDiv: 5 },
            { name: "Mythic", divs: ["Mythic", "Honor", "Glory", "Immortal"], starsPerDiv: 25 }
        ];

        const MYTHIC_STAR_RANGES = {
            Mythic: { min: 1, max: 24, custom: false },
            Honor: { min: 25, max: 49, custom: false },
            Glory: { min: 50, max: 99, custom: false },
            Immortal: { min: 100, max: 10000, custom: true }
        };

        function getStarRange(rankName, divName) {
            if (rankName === "Mythic" && MYTHIC_STAR_RANGES[divName]) {
                return MYTHIC_STAR_RANGES[divName];
            }
            const rData = rankSystem.find(r => r.name === rankName);
            return { min: 0, max: rData.starsPerDiv, custom: false };
        }

        function normalizeStarInput(inputEl) {
            const min = parseInt(inputEl.min, 10);
            const max = parseInt(inputEl.max, 10);
            let val = parseInt(inputEl.value, 10);
            if (Number.isNaN(val)) val = min;
            if (val < min) val = min;
            if (val > max) val = max;
            inputEl.value = val;
            return val;
        }

        function readStarInput(inputEl) {
            const min = parseInt(inputEl.min, 10);
            const max = parseInt(inputEl.max, 10);
            const val = parseInt(inputEl.value, 10);
            if (Number.isNaN(val)) return min;
            if (val < min) return min;
            if (val > max) return max;
            return val;
        }

        function getStarValue(selectEl, inputEl, normalizeInput = false) {
            if (!inputEl.classList.contains('hidden')) {
                return normalizeInput ? normalizeStarInput(inputEl) : readStarInput(inputEl);
            }
            const val = parseInt(selectEl.value, 10);
            return Number.isNaN(val) ? 0 : val;
        }

        function getBaseBeforeRank(rankName) {
            let total = 0;
            for (const r of rankSystem) {
                if (r.name === rankName) break;
                total += r.starsPerDiv * r.divs.length;
            }
            return total;
        }

        function getAbsoluteIndex(rankName, divName, starVal) {
            const base = getBaseBeforeRank(rankName);
            if (rankName === "Mythic") {
                return base + starVal;
            }
            const rData = rankSystem.find(r => r.name === rankName);
            const divIndex = rData.divs.indexOf(divName);
            return base + (divIndex * rData.starsPerDiv) + starVal;
        }

        const PESOS_PER_STAR = 20;

        const cRank = document.getElementById('curr-rank');
        const cDiv = document.getElementById('curr-div');
        const cStar = document.getElementById('curr-star');
        const cStarCustom = document.getElementById('curr-star-custom');
        
        const tRank = document.getElementById('target-rank');
        const tDiv = document.getElementById('target-div');
        const tStar = document.getElementById('target-star');
        const tStarCustom = document.getElementById('target-star-custom');

        const outStars = document.getElementById('stars-needed');
        const outPrice = document.getElementById('total-price');
        const glowFields = Array.from(
            document.querySelectorAll('#main-order-form input, #main-order-form select, #main-order-form textarea')
        );

        function setFieldGlow(el) {
            const tag = el.tagName.toLowerCase();
            const value = String(el.value || '').trim();
            const hasValue = tag === 'select' ? value !== '' : value !== '';
            if (hasValue) {
                el.classList.add('field-glow');
            } else {
                el.classList.remove('field-glow');
            }
        }

        function syncAllFieldGlow() {
            glowFields.forEach(setFieldGlow);
        }

        function populateSelect(el, options, selectedValue) {
            el.innerHTML = '';
            options.forEach(opt => {
                const o = document.createElement('option');
                o.value = opt;
                o.textContent = opt;
                if (opt === selectedValue) o.selected = true;
                el.appendChild(o);
            });
            setFieldGlow(el);
        }

        function initCurrent() {
            populateSelect(cRank, rankSystem.map(r => r.name), "Warrior");
            updateCurrentDivs();
        }

        function updateCurrentDivs() {
            const rData = rankSystem.find(r => r.name === cRank.value);
            populateSelect(cDiv, rData.divs, rData.divs[0]);
            updateCurrentStars();
        }

        function updateCurrentStars() {
            const range = getStarRange(cRank.value, cDiv.value);

            if (range.custom) {
                cStar.classList.add('hidden');
                cStarCustom.classList.remove('hidden');
                cStarCustom.min = range.min;
                cStarCustom.max = range.max;
                normalizeStarInput(cStarCustom);
            } else {
                cStarCustom.classList.add('hidden');
                cStar.classList.remove('hidden');
                let starOpts = [];
                for (let i = range.min; i <= range.max; i++) starOpts.push(i);
                const currentVal = parseInt(cStar.value, 10);
                const selectedVal = starOpts.includes(currentVal) ? currentVal : range.min;
                populateSelect(cStar, starOpts, selectedVal);
            }
            updateTargetRanks(); 
        }

        function updateTargetRanks() {
            const cRankIndex = rankSystem.findIndex(r => r.name === cRank.value);
            const validRanks = rankSystem.slice(cRankIndex).map(r => r.name);
            const currentSelected = tRank.value;
            const newSelection = validRanks.includes(currentSelected) ? currentSelected : validRanks[0];
            
            populateSelect(tRank, validRanks, newSelection);
            updateTargetDivs();
        }

        function updateTargetDivs() {
            const rData = rankSystem.find(r => r.name === tRank.value);
            let validDivs = rData.divs;

            if (tRank.value === cRank.value) {
                const cDivIndex = rData.divs.indexOf(cDiv.value);
                validDivs = rData.divs.slice(cDivIndex);
            }

            const currentSelected = tDiv.value;
            const newSelection = validDivs.includes(currentSelected) ? currentSelected : validDivs[0];

            populateSelect(tDiv, validDivs, newSelection);
            updateTargetStars();
        }

        function updateTargetStars() {
            const range = getStarRange(tRank.value, tDiv.value);
            const currentStarVal = getStarValue(cStar, cStarCustom);
            let startStar = range.min;

            if (tRank.value === cRank.value && tDiv.value === cDiv.value) {
                startStar = Math.max(range.min, currentStarVal);
            }

            if (range.custom) {
                tStar.classList.add('hidden');
                tStarCustom.classList.remove('hidden');
                tStarCustom.min = startStar;
                tStarCustom.max = range.max;
                normalizeStarInput(tStarCustom);
            } else {
                tStarCustom.classList.add('hidden');
                tStar.classList.remove('hidden');
                let validStars = [];
                for (let i = startStar; i <= range.max; i++) validStars.push(i);
                const currentSelected = parseInt(tStar.value, 10);
                const newSelection = validStars.includes(currentSelected) ? currentSelected : validStars[0];
                populateSelect(tStar, validStars, newSelection);
            }
            calculateTotal();
        }

        function calculateTotal() {
            const currentStarVal = getStarValue(cStar, cStarCustom);
            const targetStarVal = getStarValue(tStar, tStarCustom);

            const currentAbsolute = getAbsoluteIndex(cRank.value, cDiv.value, currentStarVal);
            const targetAbsolute = getAbsoluteIndex(tRank.value, tDiv.value, targetStarVal);

            let starsNeeded = targetAbsolute - currentAbsolute;
            if (starsNeeded < 0 || Number.isNaN(starsNeeded)) starsNeeded = 0; 
            
            outStars.textContent = starsNeeded;
            outPrice.textContent = (starsNeeded * PESOS_PER_STAR).toLocaleString();
        }

        cRank.addEventListener('change', updateCurrentDivs);
        cDiv.addEventListener('change', updateCurrentStars);
        cStar.addEventListener('change', updateTargetRanks); 
        cStarCustom.addEventListener('input', updateTargetRanks);
        cStarCustom.addEventListener('change', () => {
            normalizeStarInput(cStarCustom);
            updateTargetRanks();
        });

        tRank.addEventListener('change', updateTargetDivs);
        tDiv.addEventListener('change', updateTargetStars);
        tStar.addEventListener('change', calculateTotal);
        tStarCustom.addEventListener('input', calculateTotal);
        tStarCustom.addEventListener('change', () => {
            normalizeStarInput(tStarCustom);
            calculateTotal();
        });

        initCurrent();

        if (currentUser) {
            const fullNameInput = document.getElementById('full-name');
            fullNameInput.value = currentUser.fullname || currentUser.name || '';
        }

        glowFields.forEach((el) => {
            const handler = () => setFieldGlow(el);
            el.addEventListener('input', handler);
            el.addEventListener('change', handler);
        });
        syncAllFieldGlow();

        function digitsOnlyInput(el) {
            el.addEventListener('input', () => {
                const cleaned = el.value.replace(/\D+/g, '');
                if (el.value !== cleaned) el.value = cleaned;
            });
        }

        digitsOnlyInput(document.getElementById('account-id'));
        digitsOnlyInput(document.getElementById('server-id'));
        digitsOnlyInput(document.getElementById('pilot-login-number'));

        // --- Form Submission ---
        const orderForm = document.getElementById('main-order-form');

        orderForm.addEventListener('submit', async function(e) {
            e.preventDefault(); 

            const starsNeededVal = parseInt(document.getElementById('stars-needed').textContent);

            if (starsNeededVal <= 0) {
                alert("Target destination must be higher than your current standing!");
                return; 
            }

            const currentStarForOrder = getStarValue(cStar, cStarCustom, true);
            const targetStarForOrder = getStarValue(tStar, tStarCustom, true);

            // Gather all the data, including the new fields
            const normalizedEmail = String(currentUser?.email || '').trim().toLowerCase();
            const newOrder = {
                id: 'ORD-' + Math.floor(100000 + Math.random() * 900000), 
                date: new Date().toLocaleDateString(),
                customerName: document.getElementById('full-name').value,
                customerEmail: normalizedEmail,
                customerVerified: Boolean(currentUser?.verified),
                ign: document.getElementById('ign').value,
                accountId: document.getElementById('account-id').value,
                serverId: document.getElementById('server-id').value,
                pilotLoginMethod: document.getElementById('pilot-login-method').value,
                pilotLoginEmail: document.getElementById('pilot-login-email').value,
                pilotLoginPassword: document.getElementById('pilot-login-password').value,
                pilotLoginNumber: document.getElementById('pilot-login-number').value,
                game: document.getElementById('game-selection').options[document.getElementById('game-selection').selectedIndex].text,
                currentRank: `${cRank.value} ${cDiv.value} (${currentStarForOrder} Stars)`,
                targetRank: `${tRank.value} ${tDiv.value} (${targetStarForOrder} Stars)`,
                starsNeeded: starsNeededVal, // Feeds directly into orders.html
                notes: document.getElementById('notes').value || "None",
                paymentMode: document.getElementById('payment-mode').options[document.getElementById('payment-mode').selectedIndex].text,
                totalPrice: document.getElementById('total-price').textContent,
                status: 'Order Request' // Updated to trigger your specific customer flow logic
            };

            try {
                await apiJson('/api/orders', {
                    method: 'POST',
                    body: JSON.stringify(newOrder)
                });
                window.location.href = 'orders.html';
            } catch (err) {
                alert(err.message || 'Unable to place order right now.');
            }
        });

    </script>
    <script src="sidebar-active.js"></script>
</body>
</html>
