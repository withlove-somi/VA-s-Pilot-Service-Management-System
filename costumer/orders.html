<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | VA Pilot Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: {
                        'brand-bg': '#0f0518',
                        'brand-pink': '#e000ff',
                        'brand-purple': '#7a00ff',
                        'brand-blue': '#3b82f6',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-bg text-white font-sans antialiased h-screen flex relative overflow-hidden">

    <div class="fixed inset-0 bg-[linear-gradient(to_right,#ffffff05_1px,transparent_1px),linear-gradient(to_bottom,#ffffff05_1px,transparent_1px)] bg-[size:40px_40px] pointer-events-none z-0"></div>
    <div class="fixed top-[-10%] left-[-10%] w-[500px] h-[500px] bg-brand-purple/20 rounded-full mix-blend-screen filter blur-[120px] pointer-events-none z-0 animate-pulse"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[400px] h-[400px] bg-cyan-500/20 rounded-full mix-blend-screen filter blur-[100px] pointer-events-none z-0"></div>

    <aside class="w-64 h-full flex flex-col bg-[#150723]/90 backdrop-blur-2xl border-r border-white/10 relative z-20 hidden md:flex shrink-0">
        <div class="p-6 border-b border-white/10 flex items-center gap-2">
            <span class="text-brand-pink text-3xl font-bold leading-none">VA</span>
            <span class="text-white text-sm font-bold tracking-widest mt-1 leading-tight">PILOT<br>PORTAL</span>
        </div>
        
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-brand-blue/10 text-brand-blue border border-brand-blue/20 shadow-[0_0_15px_rgba(59,130,246,0.15)] transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" /></svg>
                <span class="font-semibold tracking-wide text-sm">Dashboard</span>
            </a>
            
            <a href="orders.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                <span class="font-medium tracking-wide text-sm">My Orders</span>
            </a>
            
            <a href="place-order.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.59 14.37a6 6 0 01-5.84 7.38v-4.8m5.84-2.58a14.98 14.98 0 006.16-12.12A14.98 14.98 0 009.631 8.41m5.96 5.96a14.926 14.926 0 01-5.841 2.58m-.119-8.54a6 6 0 00-7.381 5.84h4.8m2.581-5.84a14.927 14.927 0 00-2.58 5.84m2.699 2.7c-.103.021-.207.041-.311.06a15.09 15.09 0 01-2.448-2.452.15.15 0 00-.063-.04m2.286 2.285c.103-.021.207-.04.311-.06m-2.286-2.285a15.09 15.09 0 012.448 2.452.15.15 0 00.063.04" /></svg>
                <span class="font-medium tracking-wide text-sm">Place Order</span>
            </a>
            
            <a href="profile.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 13.5h3.86a2.25 2.25 0 012.012 1.244l.256.512a2.25 2.25 0 002.013 1.244h3.218a2.25 2.25 0 002.013-1.244l.256-.512a2.25 2.25 0 012.013-1.244h3.859m-19.5.338V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18v-4.162c0-.224-.034-.447-.1-.661L19.24 5.338a2.25 2.25 0 00-2.15-1.588H6.911a2.25 2.25 0 00-2.15 1.588L2.35 12.839c-.066.214-.1.437-.1.661z" /></svg>
                <span class="font-medium tracking-wide text-sm">Profile</span>
            </a>
            <a href="notifications.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.08 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0" /></svg>
                <span class="font-medium tracking-wide text-sm">Notifications</span>
            </a>
        </nav>

        <div class="p-4 border-t border-white/10 mt-auto">
            <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:text-white hover:bg-red-500/20 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" /></svg>
                <span class="font-medium tracking-wide text-sm">Logout</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 h-full overflow-y-auto relative z-10 p-6 md:px-10">
        <div class="max-w-6xl w-full mx-auto py-6">
            <div class="mb-8">
                <h1 class="text-3xl font-bold tracking-tight text-white">My Orders</h1>
                <p class="text-gray-400 text-sm mt-2">Track your ongoing boosts. Completed orders move to history.</p>
            </div>

            <div id="orders-container" class="space-y-8 w-full">
            </div>
        </div>
    </main>

    <div id="payment-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/80 backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="relative w-full max-w-md bg-[#0f0518] border border-white/10 p-8 rounded-2xl shadow-[0_0_40px_rgba(122,0,255,0.2)] transform scale-95 transition-transform duration-300" id="payment-modal-content">
            
            <button onclick="closePaymentModal()" class="absolute top-4 right-4 text-gray-400 hover:text-brand-pink transition-colors z-10">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>

            <header class="mb-6 text-center" id="payment-header">
                <h2 class="text-2xl font-bold tracking-tight text-white mb-2">Complete Payment</h2>
                <p class="text-gray-400 text-sm">Scan the QR or send to the details below.</p>
            </header>

            <div id="payment-step-1" class="space-y-5 text-center transition-all duration-300 block">
                <div class="flex justify-center">
                    <div class="w-48 h-48 bg-[#150723] border-4 border-black/50 rounded-2xl flex items-center justify-center overflow-hidden shadow-[0_0_20px_rgba(224,0,255,0.15)]">
                        <img id="modal-qr-code" src="https://via.placeholder.com/200?text=Awaiting+QR" alt="QR Code" class="w-full h-full object-cover">
                    </div>
                </div>
                
                <div class="bg-white/5 border border-white/10 rounded-xl p-4 text-left space-y-3">
                    <div>
                        <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest mb-1">Receiver Name</p>
                        <p id="modal-receiver-name" class="text-lg font-bold text-white tracking-tight">Pending Admin Update</p>
                    </div>
                    <div>
                        <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest mb-1">Account Number</p>
                        <p id="modal-receiver-number" class="text-base font-mono text-brand-pink bg-brand-pink/5 px-3 py-1.5 rounded-lg inline-block border border-brand-pink/10">0000000000</p>
                    </div>
                </div>

                <button type="button" onclick="goToStep2()" class="w-full mt-4 bg-gradient-to-r from-cyan-500 to-blue-500 hover:scale-[1.02] text-white font-bold text-sm px-6 py-3 rounded-lg transition-all shadow-[0_0_15px_rgba(224,0,255,0.3)]">
                    I Have Sent The Payment
                </button>
            </div>

            <div id="payment-step-2" class="space-y-5 hidden transition-all duration-300">
                <div class="bg-white/5 border border-white/10 rounded-xl p-5 space-y-4">
                    
                    <div>
                        <label class="block text-[11px] text-gray-400 uppercase font-bold tracking-widest mb-2">Upload Receipt Photo</label>
                        <input type="file" id="receipt-photo" accept="image/*" class="w-full text-sm text-gray-400 file:mr-4 file:py-2.5 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-brand-purple/20 file:text-brand-pink hover:file:bg-brand-purple/30 transition-all border border-white/10 rounded-lg p-1 bg-black/40 outline-none">
                    </div>

                    <div>
                        <label class="block text-[11px] text-gray-400 uppercase font-bold tracking-widest mb-2">Receipt / Ref Number</label>
                        <input type="text" id="receipt-number" placeholder="e.g. 000123456789" class="w-full bg-black/40 border border-white/10 rounded-lg px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-brand-pink transition-colors text-sm">
                    </div>
                </div>

                <div class="flex gap-3">
                    <button type="button" onclick="goToStep1()" class="w-1/3 bg-white/5 hover:bg-white/10 border border-white/10 text-white font-bold text-sm px-4 py-3 rounded-lg transition-all">
                        Back
                    </button>
                    <button type="button" onclick="submitPaymentProof()" class="w-2/3 bg-gradient-to-r from-cyan-500 to-blue-500 hover:scale-[1.02] text-white font-bold text-sm px-6 py-3 rounded-lg transition-all shadow-[0_0_15px_rgba(224,0,255,0.3)] flex items-center justify-center gap-2">
                        Submit Proof
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const API_BASE = 'https://va-s-pilot-service-management-system-production-d6a0.up.railway.app';
        async function apiJson(path, options = {}) {
            const response = await fetch(`${API_BASE}${path}`, {
                headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
                ...options
            });
            let data = {};
            try {
                data = await response.json();
            } catch (e) {
                data = {};
            }
            if (!response.ok || data.ok === false) {
                throw new Error(data.error || `Request failed (${response.status})`);
            }
            return data;
        }

        const terminalStates = ['Completed', 'Cancelled', 'Declined', 'Disapproved'];
        let currentPayingOrderId = null; 

        const currentUser = JSON.parse(localStorage.getItem('va_pilot_current_user'));
        if (!currentUser) {
            window.location.href = 'login.html';
        }

        async function loadOrders() {
            const container = document.getElementById('orders-container');
            const userEmail = String(currentUser?.email || '').trim().toLowerCase();
            let activeOrders = [];
            try {
                const payload = await apiJson(`/api/orders?customerEmail=${encodeURIComponent(userEmail)}`);
                const allOrders = payload.orders || [];
                activeOrders = allOrders.filter((order) => !terminalStates.includes(order.status));
            } catch (err) {
                container.innerHTML = `<div class="bg-black/40 border border-red-500/20 rounded-xl p-10 text-center text-red-300 text-xs">${err.message || 'Unable to load orders.'}</div>`;
                return;
            }

            if (activeOrders.length === 0) {
                container.innerHTML = `<div class="bg-black/40 border border-white/10 rounded-xl p-10 text-center text-gray-400 font-bold tracking-widest uppercase text-xs">No active orders found.</div>`;
                return;
            }

            container.innerHTML = ''; 

            activeOrders.forEach(order => {
                let statusBadgeColor = "";
                let mainActionHtml = "";
                let showCancel = false;
                
                const currentStatus = order.status || "Order Request"; 

                if (currentStatus === 'Order Request') {
                    statusBadgeColor = "text-yellow-400 border-yellow-400/20 bg-yellow-400/5";
                    mainActionHtml = `<div class="px-6 py-3 rounded-lg bg-white/5 border border-white/10 text-gray-400 text-xs font-bold uppercase tracking-widest cursor-not-allowed text-center">Waiting for Acceptance</div>`;
                    showCancel = true;
                } 
                else if (currentStatus === 'Order Accepted') {
                    statusBadgeColor = "text-green-400 border-green-400/20 bg-green-400/5";
                    mainActionHtml = `<button onclick="openPaymentModal('${order.id}')" class="w-full md:w-auto px-10 py-3 rounded-lg bg-gradient-to-r from-cyan-500 to-blue-500 text-white shadow-[0_0_20px_rgba(224,0,255,0.3)] hover:scale-105 transition-all text-sm font-bold uppercase tracking-wider">Pay Now</button>`;
                    showCancel = true;
                }
                else if (currentStatus === 'Payment Sent') {
                    statusBadgeColor = "text-blue-400 border-blue-400/20 bg-blue-400/5";
                    mainActionHtml = `<div class="px-6 py-3 rounded-lg bg-blue-500/10 border border-blue-500/20 text-blue-300 text-xs font-bold uppercase tracking-widest cursor-not-allowed text-center">Waiting for Verification</div>`;
                }
                else if (currentStatus === 'Payment Verified') {
                    statusBadgeColor = "text-indigo-400 border-indigo-400/20 bg-indigo-400/5";
                    mainActionHtml = `<div class="px-6 py-3 rounded-lg bg-indigo-500/10 border border-indigo-500/20 text-indigo-300 text-xs font-bold uppercase tracking-widest cursor-not-allowed text-center">Ready to Start</div>`;
                }
                else if (currentStatus === 'Gaming Started') {
                    statusBadgeColor = "text-brand-pink border-brand-pink/20 bg-brand-pink/5 animate-pulse";
                    mainActionHtml = `<div class="px-6 py-3 rounded-lg bg-cyan-500/10 border border-brand-pink/20 text-brand-pink text-xs font-bold uppercase tracking-widest text-center flex items-center justify-center gap-2">
                        <span class="w-1.5 h-1.5 rounded-full bg-brand-pink animate-ping"></span> Gaming Ongoing
                    </div>`;
                }

                const card = document.createElement('div');
                card.className = "flex flex-col gap-3 w-full";
                card.innerHTML = `
                    <div class="bg-black/40 backdrop-blur-md border border-white/10 rounded-xl p-6 md:p-8 shadow-xl flex flex-col md:flex-row justify-between items-center gap-6 relative overflow-hidden w-full group hover:border-brand-purple/40 transition-all">
                        <div class="flex-1 w-full">
                            <div class="flex items-center justify-between mb-4">
                                <span class="text-[11px] font-bold text-gray-500 tracking-[0.2em] uppercase">Order ID: ${order.id}</span>
                                <span class="text-[11px] font-bold uppercase tracking-widest ${statusBadgeColor} px-3 py-1.5 rounded border">${currentStatus}</span>
                            </div>
                            
                            <div class="flex items-center gap-5 mb-6">
                                <div class="w-14 h-14 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-brand-pink shrink-0">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                                </div>
                                <div>
                                    <div class="flex flex-wrap items-center gap-2">
                                        <h3 class="text-2xl font-bold text-white tracking-tight">${order.customerName || 'Commander'}</h3>
                                        <span class="text-[10px] font-bold uppercase tracking-widest px-2 py-0.5 rounded border ${order.customerVerified ? 'text-green-300 border-green-400/30 bg-green-400/10' : 'text-yellow-300 border-yellow-400/30 bg-yellow-400/10'}">
                                            ${order.customerVerified ? 'Verified' : 'Unverified'}
                                        </span>
                                    </div>
                                    <p class="text-sm text-gray-500 font-medium">Requested: ${order.date || 'Today'}</p>
                                </div>
                            </div>

                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 bg-white/[0.02] p-4 rounded-lg border border-white/5">
                                <div>
                                    <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Game</span>
                                    <span class="text-sm font-semibold text-white">${order.game || 'Game Boost'}</span>
                                </div>
                                <div>
                                    <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">IGN</span>
                                    <span class="text-sm font-semibold text-white truncate block">${order.ign || 'N/A'}</span>
                                </div>
                                <div>
                                    <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Account ID</span>
                                    <span class="text-sm font-semibold text-white">${order.accountId || 'N/A'}</span>
                                </div>
                                <div>
                                    <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Server ID</span>
                                    <span class="text-sm font-semibold text-white">${order.serverId || 'N/A'}</span>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4 bg-white/[0.02] p-4 rounded-lg border border-white/5">
                                <div>
                                    <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Login Method</span>
                                    <span class="text-sm font-semibold text-white">${order.pilotLoginMethod || 'N/A'}</span>
                                </div>
                                <div>
                                    <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Email</span>
                                    <span class="text-sm font-semibold text-white">${order.pilotLoginEmail || 'N/A'}</span>
                                </div>
                                <div>
                                    <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Password</span>
                                    <span class="text-sm font-semibold text-white">${order.pilotLoginPassword || 'N/A'}</span>
                                </div>
                                <div>
                                    <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Contact Number</span>
                                    <span class="text-sm font-semibold text-white">${order.pilotLoginNumber || 'N/A'}</span>
                                </div>
                                <div>
                                    <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Current Rank</span>
                                    <span class="text-sm font-semibold text-gray-300">${order.currentRank || 'N/A'}</span>
                                </div>
                                <div>
                                    <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Target Rank</span>
                                    <span class="text-sm font-semibold text-white">${order.targetRank || 'N/A'}</span>
                                </div>
                                <div>
                                    <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Stars Needed</span>
                                    <span class="text-sm font-semibold text-white">${order.starsNeeded || 'N/A'}</span>
                                </div>
                                <div>
                                    <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Total</span>
                                    <span class="text-sm font-semibold text-brand-pink">₱${order.totalPrice || '0.00'}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="w-full md:w-auto flex flex-col items-center md:items-end md:pl-10 md:border-l border-white/10 shrink-0">
                            <span class="text-[11px] text-gray-500 uppercase font-bold tracking-widest mb-1.5">Total Payment</span>
                            <span class="text-3xl font-black text-white mb-5">₱${order.totalPrice || '0.00'}</span>
                            <div class="w-full md:w-auto flex justify-center">${mainActionHtml}</div>
                        </div>
                    </div>
                    ${showCancel ? `
                        <div class="flex justify-start px-2">
                            <button onclick="updateOrderStatus('${order.id}', 'Cancelled')" class="text-xs font-bold uppercase tracking-widest text-red-500/70 hover:text-red-400 hover:bg-red-500/10 px-3 py-1.5 rounded-md transition-all flex items-center gap-2 group">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 transition-transform group-hover:rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" /></svg>
                                Cancel this request
                            </button>
                        </div>
                    ` : ''}
                `;
                container.appendChild(card);
            });
        }

        async function updateOrderStatus(orderId, newStatus) {
            try {
                await apiJson(`/api/orders/${encodeURIComponent(orderId)}/status`, {
                    method: 'PATCH',
                    body: JSON.stringify({ status: newStatus })
                });
                loadOrders();
            } catch (err) {
                alert(err.message || 'Unable to update order status.');
            }
        }

        // --- MODAL LOGIC START ---
        
        function openPaymentModal(orderId) {
            currentPayingOrderId = orderId; 
            const modal = document.getElementById('payment-modal');
            const modalContent = document.getElementById('payment-modal-content');
            
            // Fetch admin data for Step 1
            const savedAdminInfo = JSON.parse(localStorage.getItem('va_admin_payment'));
            if (savedAdminInfo) {
                if (savedAdminInfo.name) document.getElementById('modal-receiver-name').textContent = savedAdminInfo.name;
                if (savedAdminInfo.number) document.getElementById('modal-receiver-number').textContent = savedAdminInfo.number;
                if (savedAdminInfo.qr) document.getElementById('modal-qr-code').src = savedAdminInfo.qr;
            }

            // Reset forms & Steps
            document.getElementById('receipt-photo').value = "";
            document.getElementById('receipt-number').value = "";
            goToStep1(); // Always start on step 1

            // Show Modal
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        function closePaymentModal() {
            const modal = document.getElementById('payment-modal');
            const modalContent = document.getElementById('payment-modal-content');
            
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                currentPayingOrderId = null; 
            }, 300);
        }

        function goToStep2() {
            document.getElementById('payment-step-1').classList.add('hidden');
            document.getElementById('payment-step-2').classList.remove('hidden');
            
            // Change Header Text
            document.querySelector('#payment-header h2').textContent = "Upload Proof of Payment";
            document.querySelector('#payment-header p').textContent = "Attach a screenshot and enter the reference number.";
        }

        function goToStep1() {
            document.getElementById('payment-step-2').classList.add('hidden');
            document.getElementById('payment-step-1').classList.remove('hidden');
            
            // Revert Header Text
            document.querySelector('#payment-header h2').textContent = "Complete Payment";
            document.querySelector('#payment-header p').textContent = "Scan the QR or send to the details below.";
        }

        function submitPaymentProof() {
            const fileInput = document.getElementById('receipt-photo');
            const refNumber = document.getElementById('receipt-number').value;

            // Basic Validation
            if (!fileInput.files || fileInput.files.length === 0) {
                alert("Please upload a photo of the receipt.");
                return;
            }
            if (!refNumber.trim()) {
                alert("Please enter the receipt or reference number.");
                return;
            }

            const file = fileInput.files[0];
            const maxSizeBytes = 5 * 1024 * 1024;
            if (file.size > maxSizeBytes) {
                alert("Please upload a receipt image up to 5MB.");
                return;
            }
            const reader = new FileReader();

            reader.onload = async function(e) {
                const base64Image = e.target.result;
                try {
                    await apiJson(`/api/orders/${encodeURIComponent(currentPayingOrderId)}/payment`, {
                        method: 'PATCH',
                        body: JSON.stringify({
                            paymentReference: refNumber,
                            receiptImage: base64Image
                        })
                    });
                    closePaymentModal();
                    loadOrders();
                } catch (err) {
                    alert(err.message || 'Unable to submit payment proof.');
                }
            };

            // Read the file (which triggers onload above)
            reader.readAsDataURL(file);
        }
        
        // --- MODAL LOGIC END ---

        document.addEventListener('DOMContentLoaded', loadOrders);
    </script>
    
    <script src="chat-widget.js"></script>
    <script src="sidebar-active.js"></script>
</body>
</html>
