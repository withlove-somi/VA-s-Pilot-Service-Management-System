            <div>

    <div id="profile-photo-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 backdrop-blur-sm p-4">
        <div class="w-full max-w-lg bg-[#150723] border border-white/10 rounded-2xl p-6">
            <div class="flex items-center justify-between mb-5">
                <h3 class="text-lg font-bold">Update Profile Photo</h3>
            </div>
            <div class="flex flex-col sm:flex-row items-center gap-4">
                <div class="w-24 h-24 rounded-full border border-white/10 bg-black/30 overflow-hidden flex items-center justify-center text-2xl font-bold text-white">
                    <img id="profile-photo-preview" alt="New profile preview" class="hidden w-full h-full object-cover">
                    <span id="profile-photo-fallback">VA</span>
                </div>
                <div class="flex-1 w-full">
                    <label class="block text-xs text-gray-400 uppercase tracking-wider mb-2">Upload New Photo</label>
                    <input id="profile-photo-input" type="file" accept="image/*" class="w-full text-sm text-gray-300">
                    <p class="text-[11px] text-gray-500 mt-2">JPG or PNG, up to 5MB.</p>
                </div>
            </div>
            <p id="profile-photo-error" class="text-red-400 text-sm hidden mt-4"></p>
            <div class="mt-6 flex items-center justify-end gap-3">
                <button type="button" onclick="closeProfilePhotoModal()" class="px-4 py-2 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10 text-sm font-semibold text-white">Cancel</button>
                <button type="button" onclick="saveProfilePhoto()" class="px-4 py-2 rounded-lg bg-gradient-to-r from-cyan-500 to-blue-500 text-sm font-bold text-white shadow-[0_0_15px_rgba(224,0,255,0.3)]">Save Photo</button>
            </div>
        </div>
    </div>

    <div id="verification-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/75 backdrop-blur-sm p-4">
        <div class="w-full max-w-2xl bg-[#150723] border border-white/10 rounded-2xl p-6 max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xl font-bold">Verification Request</h3>
                <button type="button" onclick="closeVerificationModal()" class="text-gray-400 hover:text-white text-sm">Close</button>
            </div>
            <form id="verification-form" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-gray-400 uppercase tracking-wider mb-1">Full Name</label>
                        <input id="verify-name" required type="text" class="w-full bg-black/40 border border-white/10 rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 uppercase tracking-wider mb-1">Email</label>
                        <input id="verify-email" required type="email" class="w-full bg-black/40 border border-white/10 rounded-lg px-3 py-2">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-gray-400 uppercase tracking-wider mb-1">Phone Number</label>
                        <input id="verify-number" required type="text" class="w-full bg-black/40 border border-white/10 rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 uppercase tracking-wider mb-1">Government ID Type</label>
                        <select id="verify-id-type" required class="w-full bg-black/40 border border-white/10 rounded-lg px-3 py-2">
                            <option value="">Select ID</option>
                            <option>Passport</option>
                            <option>Driver's License</option>
                            <option>National ID</option>
                            <option>SSS ID</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 uppercase tracking-wider mb-1">ID Number</label>
                    <input id="verify-id-number" required type="text" class="w-full bg-black/40 border border-white/10 rounded-lg px-3 py-2">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-gray-400 uppercase tracking-wider mb-1">Upload Government ID</label>
                        <input id="verify-id-photo" required type="file" accept="image/*" class="w-full text-sm">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 uppercase tracking-wider mb-1">Upload Selfie with ID</label>
                        <input id="verify-selfie-photo" required type="file" accept="image/*" class="w-full text-sm">
                    </div>
                </div>
                <p id="verification-error" class="text-red-400 text-sm hidden"></p>
                <button type="submit" class="w-full py-3 rounded-lg bg-gradient-to-r from-brand-blue to-brand-purple font-bold">
                    Submit Verification
                </button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = 'https://va-s-pilot-service-management-system-production-d6a0.up.railway.app';
        let currentUser = JSON.parse(localStorage.getItem('va_pilot_current_user'));
        if (!currentUser) {
            window.location.href = 'login.html';
        }

        async function apiJson(path, options = {}) {
            const response = await fetch(`${API_BASE}${path}`, {
                headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
                ...options
            });
            let data = {};
            try {
                data = await response.json();
            } catch (e) {
                data = {};
            }
            if (!response.ok || data.ok === false) {
                throw new Error(data.error || `Request failed (${response.status})`);
            }
            return data;
        }

        function readFileAsDataUrl(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = () => reject(new Error("Failed to read file."));
                reader.readAsDataURL(file);
            });
        }

        async function hasPendingVerification(email) {
            const normalized = String(email || '').trim().toLowerCase();
            const payload = await apiJson(`/api/verifications?userEmail=${encodeURIComponent(normalized)}&status=Pending`);
            return (payload.requests || []).length > 0;
        }

        function applyProfileImage(imageData) {
            const avatar = document.getElementById('user-avatar');
            const initials = document.getElementById('user-initials');
            if (imageData) {
                avatar.src = imageData;
                avatar.classList.remove('hidden');
                initials.classList.add('hidden');
            } else {
                avatar.removeAttribute('src');
                avatar.classList.add('hidden');
                initials.classList.remove('hidden');
            }
        }

        async function renderProfile() {
            const email = String(currentUser.email || '').trim().toLowerCase();
            const payload = await apiJson(`/api/users/${encodeURIComponent(email)}`);
            const latest = payload.user || currentUser;
            currentUser = latest;
            localStorage.setItem('va_pilot_current_user', JSON.stringify(latest));

            document.getElementById('user-name').textContent = latest.fullname || latest.name || 'Pilot';
            document.getElementById('user-email').textContent = latest.email || 'N/A';
            document.getElementById('user-initials').textContent = (latest.fullname || latest.name || 'VA')
                .split(' ')
                .slice(0, 2)
                .map((n) => n[0] || '')
                .join('')
                .toUpperCase();

            applyProfileImage(latest.profileImage);

            const statusEl = document.getElementById('verification-status');
            if (latest.verified) {
                statusEl.textContent = 'Verified';
                statusEl.className = 'px-3 py-1 rounded border text-[10px] font-bold uppercase tracking-widest bg-green-500/10 text-green-400 border-green-500/20';
            } else {
                statusEl.textContent = 'Unverified';
                statusEl.className = 'px-3 py-1 rounded border text-[10px] font-bold uppercase tracking-widest bg-red-500/5 text-red-400 border-red-500/20';
            }
        }

        const PROFILE_PHOTO_MAX_BYTES = 5 * 1024 * 1024;
        let pendingProfileImage = '';

        function updateProfilePhotoPreview(dataUrl) {
            const preview = document.getElementById('profile-photo-preview');
            const fallback = document.getElementById('profile-photo-fallback');
            if (dataUrl) {
                preview.src = dataUrl;
                preview.classList.remove('hidden');
                fallback.classList.add('hidden');
            } else {
                preview.removeAttribute('src');
                preview.classList.add('hidden');
                fallback.classList.remove('hidden');
                fallback.textContent = (currentUser.fullname || currentUser.name || 'VA')
                    .split(' ')
                    .slice(0, 2)
                    .map((n) => n[0] || '')
                    .join('')
                    .toUpperCase();
            }
        }

        function openProfilePhotoModal() {
            const modal = document.getElementById('profile-photo-modal');
            const error = document.getElementById('profile-photo-error');
            const input = document.getElementById('profile-photo-input');
            error.classList.add('hidden');
            input.value = '';
            pendingProfileImage = currentUser.profileImage || '';
            updateProfilePhotoPreview(pendingProfileImage);
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeProfilePhotoModal() {
            const modal = document.getElementById('profile-photo-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.getElementById('profile-photo-error').classList.add('hidden');
        }

        function editProfile() {
            openProfilePhotoModal();
        }

        async function saveProfilePhoto() {
            const error = document.getElementById('profile-photo-error');
            error.classList.add('hidden');
            const email = String(currentUser.email || '').trim().toLowerCase();
            const input = document.getElementById('profile-photo-input');
            const file = input ? input.files[0] : null;

            if (!pendingProfileImage && file) {
                if (file.size > PROFILE_PHOTO_MAX_BYTES) {
                    const sizeMb = (file.size / (1024 * 1024)).toFixed(2);
                    error.textContent = `Please choose an image under 5MB. Selected: ${sizeMb}MB.`;
                    error.classList.remove('hidden');
                    input.value = '';
                    return;
                }
                try {
                    pendingProfileImage = await readFileAsDataUrl(file);
                    updateProfilePhotoPreview(pendingProfileImage);
                } catch (err) {
                    error.textContent = err.message || 'Unable to read that image.';
                    error.classList.remove('hidden');
                    return;
                }
            }

            if (!pendingProfileImage) {
                error.textContent = 'Please choose a photo to upload.';
                error.classList.remove('hidden');
                return;
            }

            try {
                const payload = await apiJson(`/api/users/${encodeURIComponent(email)}/profile-image`, {
                    method: 'PATCH',
                    body: JSON.stringify({ profileImage: pendingProfileImage })
                });
                currentUser = payload.user || { ...currentUser, profileImage: pendingProfileImage };
                localStorage.setItem('va_pilot_current_user', JSON.stringify(currentUser));
                applyProfileImage(currentUser.profileImage);
                closeProfilePhotoModal();
            } catch (err) {
                error.textContent = err.message || 'Unable to update profile photo.';
                error.classList.remove('hidden');
            }
        }

        async function verifyAccount() {
            if (currentUser.verified) {
                alert("This account is already verified. You cannot submit another verification request.");
                return;
            }
            try {
                if (await hasPendingVerification(currentUser.email)) {
                    alert("You already have a pending verification request. Please wait for admin review.");
                    return;
                }
            } catch (err) {
                alert(err.message || "Unable to validate verification status.");
                return;
            }

            const modal = document.getElementById('verification-modal');
            document.getElementById('verify-name').value = currentUser.fullname || currentUser.name || '';
            document.getElementById('verify-email').value = currentUser.email || '';
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeVerificationModal() {
            const modal = document.getElementById('verification-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.getElementById('verification-error').classList.add('hidden');
        }

        document.getElementById('verification-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const error = document.getElementById('verification-error');
            error.classList.add('hidden');

            try {
                const idPhoto = document.getElementById('verify-id-photo').files[0];
                const selfiePhoto = document.getElementById('verify-selfie-photo').files[0];
                if (!idPhoto || !selfiePhoto) {
                    throw new Error("Please upload both ID and selfie images.");
                }

                const [idPhotoData, selfiePhotoData] = await Promise.all([
                    readFileAsDataUrl(idPhoto),
                    readFileAsDataUrl(selfiePhoto)
                ]);

                const request = {
                    id: `VR-${Date.now()}`,
                    userEmail: String(document.getElementById('verify-email').value).trim().toLowerCase(),
                    fullName: document.getElementById('verify-name').value.trim(),
                    phoneNumber: document.getElementById('verify-number').value.trim(),
                    govIdType: document.getElementById('verify-id-type').value,
                    govIdNumber: document.getElementById('verify-id-number').value.trim(),
                    govIdPhoto: idPhotoData,
                    selfieWithId: selfiePhotoData
                };

                if (await hasPendingVerification(request.userEmail)) {
                    throw new Error("You already have a pending verification request.");
                }

                await apiJson('/api/verifications', {
                    method: 'POST',
                    body: JSON.stringify(request)
                });

                closeVerificationModal();
                alert("Verification request submitted.");
            } catch (err) {
                error.textContent = err.message || "Unable to submit verification request.";
                error.classList.remove('hidden');
            }
        });

        async function loadTransactions() {
            const container = document.getElementById('transactions-container');
            const terminalStates = ['Completed', 'Cancelled', 'Declined', 'Disapproved'];
            const userEmail = String(currentUser.email || '').trim().toLowerCase();
            const payload = await apiJson(`/api/orders?customerEmail=${encodeURIComponent(userEmail)}`);
            const allOrders = payload.orders || [];
            const historyOrders = allOrders.filter((order) => terminalStates.includes(order.status));

            if (historyOrders.length === 0) {
                container.innerHTML = `
                    <div class="bg-white/5 border border-white/10 rounded-xl p-8 text-center">
                        <p class="text-gray-500 text-sm">No past transactions found.</p>
                    </div>`;
                return;
            }

            container.innerHTML = '';
            historyOrders.reverse().forEach((order) => {
                const badgeStyle = order.status === 'Completed'
                    ? "bg-green-500/10 text-green-400 border-green-500/20"
                    : "bg-red-500/10 text-red-400 border-red-500/20";

                const card = document.createElement('div');
                card.className = "bg-black/40 backdrop-blur-md border border-white/10 rounded-xl p-5 flex flex-col md:flex-row justify-between items-center gap-4 transition-all hover:border-white/20";
                card.innerHTML = `
                    <div class="flex items-center gap-4 w-full md:w-auto">
                        <div class="w-12 h-12 rounded-lg bg-white/5 border border-white/10 flex items-center justify-center shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z" /></svg>
                        </div>
                        <div>
                            <div class="flex items-center gap-3">
                                <h4 class="font-bold text-white">${order.game || 'Boost Service'}</h4>
                                <span class="px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-widest border ${badgeStyle}">${order.status}</span>
                            </div>
                            <p class="text-xs text-gray-500 mt-1">Order ID: <span class="text-gray-400">${order.id}</span> • Date: ${order.date || '-'}</p>
                        </div>
                    </div>
                    <div class="w-full md:w-auto text-left md:text-right flex flex-col justify-center">
                        <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Amount</span>
                        <span class="text-lg font-bold text-white">₱${order.totalPrice || '0.00'}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                await renderProfile();
                await loadTransactions();
            } catch (err) {
                alert(err.message || "Unable to load profile data.");
            }
        });

        const profilePhotoInput = document.getElementById('profile-photo-input');
        if (profilePhotoInput) {
            profilePhotoInput.addEventListener('change', async (event) => {
                const error = document.getElementById('profile-photo-error');
                error.classList.add('hidden');
                const file = event.target.files[0];
                if (!file) {
                    pendingProfileImage = currentUser.profileImage || '';
                    updateProfilePhotoPreview(pendingProfileImage);
                    return;
                }
                if (file.size > PROFILE_PHOTO_MAX_BYTES) {
                    const sizeMb = (file.size / (1024 * 1024)).toFixed(2);
                    error.textContent = `Please choose an image under 5MB. Selected: ${sizeMb}MB.`;
                    error.classList.remove('hidden');
                    event.target.value = '';
                    pendingProfileImage = currentUser.profileImage || '';
                    updateProfilePhotoPreview(pendingProfileImage);
                    return;
                }
                try {
                    pendingProfileImage = await readFileAsDataUrl(file);
                    updateProfilePhotoPreview(pendingProfileImage);
                } catch (err) {
                    error.textContent = err.message || 'Unable to read that image.';
                    error.classList.remove('hidden');
                }
            });
        }
    </script>
    
    <script src="chat-widget.js"></script>
    <script src="sidebar-active.js"></script>
</body>
