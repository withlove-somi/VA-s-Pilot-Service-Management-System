<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback | VA Pilot Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Poppins", "sans-serif"],
              mono: ["ui-monospace", "SFMono-Regular", "Menlo", "Monaco", "Consolas", "monospace"],
            },
            colors: {
              "brand-bg": "#0f0518",
              "brand-pink": "#e000ff",
              "brand-purple": "#7a00ff",
              "brand-blue": "#3b82f6",
            },
          },
        },
      };
    </script>
    <style>
      #page-loader {
        position: fixed;
        left: 50%;
        top: 24px;
        transform: translateX(-50%);
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 14px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        color: #ffffff;
        z-index: 9999;
      }
      #page-loader .spinner {
        width: 22px;
        height: 22px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-top-color: #ffffff;
        border-radius: 50%;
        animation: pageLoaderSpin 0.9s linear infinite;
      }
      #page-loader .label {
        font-size: 14px;
        letter-spacing: 0.2px;
      }
      #page-loader.hidden {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
      }
      @keyframes pageLoaderSpin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body class="bg-brand-bg text-white font-sans antialiased selection:bg-brand-pink selection:text-white min-h-screen relative overflow-hidden">
    <div class="fixed inset-0 bg-[linear-gradient(to_right,#ffffff05_1px,transparent_1px),linear-gradient(to_bottom,#ffffff05_1px,transparent_1px)] bg-[size:40px_40px] pointer-events-none z-0"></div>
    <div class="fixed top-[-10%] left-[-10%] w-[520px] h-[520px] bg-brand-purple/20 rounded-full mix-blend-screen filter blur-[120px] pointer-events-none z-0 animate-pulse"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[420px] h-[420px] bg-brand-pink/20 rounded-full mix-blend-screen filter blur-[100px] pointer-events-none z-0"></div>

    <a href="dashboard.html" class="absolute top-8 left-8 z-20 text-gray-400 hover:text-brand-pink transition-colors flex items-center gap-2 text-sm font-medium">
      <span aria-hidden="true">←</span>
      Back to Dashboard
    </a>

    <main class="relative z-10 flex items-center justify-center px-6 py-16">
      <div class="w-full max-w-3xl">
        <div class="bg-[#150723]/80 backdrop-blur-xl border border-white/10 p-8 md:p-10 rounded-3xl shadow-[0_0_50px_rgba(0,0,0,0.45)]">
          <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4 mb-8">
            <div>
              <div class="flex items-center gap-2 mb-2">
                <span class="text-brand-pink text-3xl font-bold leading-none">VA</span>
                <span class="text-white text-sm font-bold tracking-widest mt-1 leading-tight">PILOT<br />PORTAL</span>
              </div>
              <h1 class="text-2xl md:text-3xl font-bold tracking-tight text-white">Feedback</h1>
              <p class="text-xs text-gray-400 mt-2">Tell us what we can improve or what you liked.</p>
            </div>
            <div class="text-[11px] font-mono text-gray-500 uppercase tracking-widest">Secure Channel</div>
          </div>

          <form id="feedback-form" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
              <div>
                <label for="fb-name" class="block text-xs font-medium text-gray-400 mb-2 uppercase tracking-wider">Name</label>
                <input id="fb-name" name="name" type="text" placeholder="Your name" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-brand-pink focus:ring-1 focus:ring-brand-pink transition-all" />
              </div>
              <div>
                <label for="fb-email" class="block text-xs font-medium text-gray-400 mb-2 uppercase tracking-wider">Email</label>
                <input id="fb-email" name="email" type="email" placeholder="you@example.com" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-brand-pink focus:ring-1 focus:ring-brand-pink transition-all" />
              </div>
              <div>
                <label for="fb-rating" class="block text-xs font-medium text-gray-400 mb-2 uppercase tracking-wider">Rating</label>
                <select id="fb-rating" name="rating" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-pink focus:ring-1 focus:ring-brand-pink transition-all">
                  <option value="">Select</option>
                  <option value="5">5 - Excellent</option>
                  <option value="4">4 - Good</option>
                  <option value="3">3 - Okay</option>
                  <option value="2">2 - Poor</option>
                  <option value="1">1 - Bad</option>
                </select>
              </div>
            </div>

            <div>
              <label for="fb-message" class="block text-xs font-medium text-gray-400 mb-2 uppercase tracking-wider">Message</label>
              <textarea id="fb-message" name="message" required class="w-full min-h-[160px] bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-brand-pink focus:ring-1 focus:ring-brand-pink transition-all resize-y"></textarea>
            </div>

            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
              <p class="text-xs text-gray-500">Tip: include order ID or a screenshot description for faster help.</p>
              <button class="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-brand-pink to-brand-purple hover:from-fuchsia-500 hover:to-purple-500 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-[0_0_15px_rgba(224,0,255,0.3)] hover:shadow-[0_0_25px_rgba(224,0,255,0.6)] text-xs uppercase tracking-widest" type="submit">
                Send Feedback
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <div id="page-loader" role="status" aria-live="polite" aria-busy="true">
      <div class="spinner" aria-hidden="true"></div>
      <span class="label">Loading...</span>
    </div>
    <script>
      window.addEventListener("load", function () {
        var loader = document.getElementById("page-loader");
        if (!loader) return;
        loader.classList.add("hidden");
        setTimeout(function () {
          if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
        }, 250);
      });

      var API_BASE = "http://127.0.0.1:5000";
      async function apiJson(path, options) {
        var response = await fetch(API_BASE + path, {
          headers: { "Content-Type": "application/json" },
          ...(options || {}),
        });
        var data = {};
        try {
          data = await response.json();
        } catch (err) {
          data = {};
        }
        if (!response.ok || data.ok === false) {
          throw new Error(data.error || "Request failed (" + response.status + ")");
        }
        return data;
      }

      (function () {
        var stored = null;
        try {
          stored = JSON.parse(localStorage.getItem("user"));
        } catch (err) {}
        var user = stored && stored.user ? stored.user : stored;
        var name = user ? [user.firstName, user.lastName].filter(Boolean).join(" ") : "";
        var email = user && user.email ? user.email : "";
        var userId = user && user.id ? user.id : user && user._id ? user._id : "";

        if (name) document.getElementById("fb-name").value = name;
        if (email) document.getElementById("fb-email").value = email;

        var form = document.getElementById("feedback-form");
        form.addEventListener("submit", async function (event) {
          event.preventDefault();
          var payload = {
            userId: userId || undefined,
            userEmail: email || undefined,
            name: document.getElementById("fb-name").value.trim(),
            email: document.getElementById("fb-email").value.trim(),
            rating: document.getElementById("fb-rating").value,
            message: document.getElementById("fb-message").value.trim(),
          };
          if (!payload.message) {
            alert("Please enter your feedback.");
            return;
          }

          var button = form.querySelector("button[type='submit']");
          button.disabled = true;
          try {
            await apiJson("/api/feedback", {
              method: "POST",
              body: JSON.stringify(payload),
            });
            form.reset();
            if (email) document.getElementById("fb-email").value = email;
            if (name) document.getElementById("fb-name").value = name;
            alert("Thanks for your feedback!");
          } catch (err) {
            alert(err.message || "Failed to submit feedback");
          } finally {
            button.disabled = false;
          }
        });
      })();
    </script>
  </body>
</html>
