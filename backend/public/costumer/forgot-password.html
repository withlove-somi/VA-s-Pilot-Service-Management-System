<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | VA Pilot Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
                    },
                    colors: {
                        'brand-bg': '#0f0518',
                        'brand-pink': '#e000ff',
                        'brand-purple': '#7a00ff',
                    }
                }
            }
        }
    </script>
  <style>
    #page-loader {
      position: fixed;
      left: 50%;
      top: 24px;
      transform: translateX(-50%);
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 14px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      color: #1a1a1a;
      z-index: 9999;
    }
    #page-loader .spinner {
      width: 22px;
      height: 22px;
      border: 3px solid rgba(26, 26, 26, 0.2);
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: pageLoaderSpin 0.9s linear infinite;
    }
    #page-loader .label {
      font-size: 14px;
      letter-spacing: 0.2px;
    }
    #page-loader.hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    @keyframes pageLoaderSpin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
  <script src="/js/config.js"></script>
</head>
<body class="bg-brand-bg text-white font-sans antialiased selection:bg-brand-pink selection:text-white h-screen flex items-center justify-center relative overflow-hidden">

    <div class="absolute inset-0 bg-[linear-gradient(to_right,#ffffff05_1px,transparent_1px),linear-gradient(to_bottom,#ffffff05_1px,transparent_1px)] bg-[size:40px_40px] pointer-events-none z-0"></div>
    
    <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-brand-purple/20 rounded-full mix-blend-screen filter blur-[120px] pointer-events-none z-0 animate-pulse"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[400px] h-[400px] bg-brand-pink/20 rounded-full mix-blend-screen filter blur-[100px] pointer-events-none z-0"></div>

    <a href="login.html" class="absolute top-8 left-8 z-20 text-gray-400 hover:text-brand-pink transition-colors flex items-center gap-2 text-sm font-medium">
        <span>←</span> Back to Login
    </a>

    <div class="w-full max-w-md relative z-10 px-6">
        
        <div class="bg-[#150723]/80 backdrop-blur-xl border border-white/10 p-10 rounded-3xl shadow-[0_0_50px_rgba(0,0,0,0.5)]">
            
            <div class="text-center mb-8">
                <div class="flex items-center justify-center gap-2 mb-4">
                    <span class="text-brand-pink text-3xl font-bold leading-none">VA</span>
                    <span class="text-white text-lg font-bold tracking-widest mt-1">PILOT SERVICE</span>
                </div>
                <h1 class="text-2xl font-bold tracking-tight">System Recovery</h1>
                <p class="text-xs text-gray-400 mt-3 leading-relaxed">
                    Enter your registered email address below. We will transmit a secure One-Time Password (OTP) to verify your identity.
                </p>
            </div>

            <form id="forgot-form" class="space-y-6">
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-2 uppercase tracking-wider">Account Email</label>
                    <div class="relative">
                        <input type="email" id="email" required placeholder="commander@domain.com" class="w-full bg-black/40 border border-white/10 rounded-xl pl-4 pr-10 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-brand-pink focus:ring-1 focus:ring-brand-pink transition-all">
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500">✉</span>
                    </div>
                </div>

                <p id="error-msg" class="text-red-500 text-xs text-center hidden font-medium bg-red-500/10 py-2 rounded-lg border border-red-500/20"></p>

                <button type="submit" class="block text-center w-full bg-gradient-to-r from-brand-pink to-brand-purple hover:from-fuchsia-500 hover:to-purple-500 text-white font-bold py-4 rounded-xl transition-all shadow-[0_0_15px_rgba(224,0,255,0.3)] hover:shadow-[0_0_25px_rgba(224,0,255,0.6)] hover:-translate-y-0.5 mt-4 tracking-widest text-sm">
                    SEND OTP
                </button>
            </form>

            <div class="mt-8 text-center text-sm text-gray-400 border-t border-white/5 pt-6">
                <a href="login.html" class="flex items-center justify-center text-brand-pink hover:text-white font-semibold transition-colors">Return to Login</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="auth-otp.js"></script>
    <script>
        const API_BASE = window.API_BASE || 'https://va-s-pilot-service-management-system-production-d6a0.up.railway.app';
        const forgotForm = document.getElementById('forgot-form');
        const emailInput = document.getElementById('email');
        const errorMsg = document.getElementById('error-msg');

        async function apiJson(path, options = {}) {
            const response = await fetch(`${API_BASE}${path}`, {
                headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
                ...options
            });
            let data = {};
            try {
                data = await response.json();
            } catch (e) {
                data = {};
            }
            if (!response.ok || data.ok === false) {
                throw new Error(data.error || `Request failed (${response.status})`);
            }
            return data;
        }

        forgotForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.add('hidden');

            const email = emailInput.value.trim().toLowerCase();
            try {
                const payload = await apiJson(`/api/users/${encodeURIComponent(email)}`);
                const user = payload.user || {};
                await startOtpFlow(user.email, 'reset_password', user.fullname || user.name || 'Pilot');
                window.location.href = 'verify-otp.html';
            } catch (err) {
                errorMsg.textContent = err.message || "Email not registered.";
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
    <script src="chat-widget.js"></script>
  <div id="page-loader" role="status" aria-live="polite" aria-busy="true">
    <div class="spinner" aria-hidden="true"></div>
    <span class="label">Loading...</span>
  </div>
  <script>
    window.addEventListener("load", function () {
      var loader = document.getElementById("page-loader");
      if (!loader) return;
      loader.classList.add("hidden");
      setTimeout(function () {
        if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
      }, 250);
    });
  </script>
</body>
</html>
