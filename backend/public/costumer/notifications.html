  <main class="flex-1 overflow-y-auto p-6 md:p-10 z-10">
    <h1 class="text-3xl font-bold mb-2">Notifications</h1>
    <p class="text-gray-400 mb-6">Order and verification updates from admin. Notifications expire after 30 days.</p>

    <section class="mb-8">
      <h2 class="text-sm uppercase tracking-widest text-cyan-300 mb-3">Today</h2>
      <div id="today-list" class="space-y-3"></div>
    </section>

    <section class="mb-8">
      <h2 class="text-sm uppercase tracking-widest text-cyan-300 mb-3">Last 7 Days</h2>
      <div id="week-list" class="space-y-3"></div>
    </section>

    <section>
      <h2 class="text-sm uppercase tracking-widest text-cyan-300 mb-3">Last 30 Days</h2>
      <div id="month-list" class="space-y-3"></div>
    </section>
  </main>

  <script>
    const API_BASE = window.API_BASE || 'https://va-s-pilot-service-management-system-production-d6a0.up.railway.app';
    async function apiJson(path, options = {}) {
      const response = await fetch(`${API_BASE}${path}`, {
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        ...options
      });
      let data = {};
      try {
        data = await response.json();
      } catch (e) {
        data = {};
      }
      if (!response.ok || data.ok === false) {
        throw new Error(data.error || `Request failed (${response.status})`);
      }
      return data;
    }

    const currentUser = JSON.parse(localStorage.getItem('va_pilot_current_user') || 'null');
    if (!currentUser) window.location.href = 'login.html';

    const THIRTY_DAYS_MS = 30 * 24 * 60 * 60 * 1000;
    const SEVEN_DAYS_MS = 7 * 24 * 60 * 60 * 1000;

    async function loadNotifications() {
      const email = String(currentUser.email || '').trim().toLowerCase();
      const payload = await apiJson(`/api/notifications?userEmail=${encodeURIComponent(email)}`);
      return payload.notifications || [];
    }

    function renderGroup(containerId, list) {
      const container = document.getElementById(containerId);
      if (!list.length) {
        container.innerHTML = '<div class="p-4 bg-black/30 border border-white/10 rounded-lg text-gray-500 text-sm">No notifications.</div>';
        return;
      }

      container.innerHTML = '';
      list.forEach((n) => {
        const typeColor = n.type === 'order' ? 'border-yellow-400/30' : 'border-cyan-400/30';
        const row = document.createElement('div');
        row.className = `p-4 bg-black/40 border ${typeColor} rounded-lg`;
        row.innerHTML = `
          <div class="flex items-center justify-between mb-1">
            <div class="font-semibold">${n.title || 'Notification'}</div>
            <div class="text-xs text-gray-500">${new Date(n.createdAt).toLocaleString()}</div>
          </div>
          <div class="text-sm text-gray-300">${n.message || ''}</div>
        `;
        container.appendChild(row);
      });
    }

    async function render() {
      let all = [];
      try {
        all = await loadNotifications();
      } catch (err) {
        document.getElementById('today-list').innerHTML = `<div class="p-4 bg-black/30 border border-red-500/20 rounded-lg text-red-300 text-sm">${err.message || 'Unable to load notifications.'}</div>`;
        document.getElementById('week-list').innerHTML = '';
        document.getElementById('month-list').innerHTML = '';
        return;
      }
      const now = Date.now();

      const today = all.filter((n) => new Date(n.createdAt).toDateString() === new Date().toDateString());
      const week = all.filter((n) => {
        const age = now - new Date(n.createdAt).getTime();
        return age > 24 * 60 * 60 * 1000 && age <= SEVEN_DAYS_MS;
      });
      const month = all.filter((n) => {
        const age = now - new Date(n.createdAt).getTime();
        return age > SEVEN_DAYS_MS && age <= THIRTY_DAYS_MS;
      });

      renderGroup('today-list', today);
      renderGroup('week-list', week);
      renderGroup('month-list', month);
    }

    document.addEventListener('DOMContentLoaded', render);
  </script>
