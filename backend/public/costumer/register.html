<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | VA Pilot Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
                    },
                    colors: {
                        'brand-bg': '#0f0518',
                        'brand-pink': '#e000ff',
                        'brand-purple': '#7a00ff',
                    }
                }
            }
        }
    </script>
  <style>
    #page-loader {
      position: fixed;
      left: 50%;
      top: 24px;
      transform: translateX(-50%);
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 14px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      color: #1a1a1a;
      z-index: 9999;
    }
    #page-loader .spinner {
      width: 22px;
      height: 22px;
      border: 3px solid rgba(26, 26, 26, 0.2);
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: pageLoaderSpin 0.9s linear infinite;
    }
    #page-loader .label {
      font-size: 14px;
      letter-spacing: 0.2px;
    }
    #page-loader.hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    @keyframes pageLoaderSpin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
  <script src="/js/config.js"></script>
</head>
<body class="bg-brand-bg text-white font-sans antialiased selection:bg-brand-pink selection:text-white h-screen flex items-center justify-center relative overflow-hidden">

    <div class="absolute inset-0 bg-[linear-gradient(to_right,#ffffff05_1px,transparent_1px),linear-gradient(to_bottom,#ffffff05_1px,transparent_1px)] bg-[size:40px_40px] pointer-events-none z-0"></div>
    
    <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-brand-purple/20 rounded-full mix-blend-screen filter blur-[120px] pointer-events-none z-0 animate-pulse"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[400px] h-[400px] bg-brand-pink/20 rounded-full mix-blend-screen filter blur-[100px] pointer-events-none z-0"></div>

    <a href="login.html" class="absolute top-8 left-8 z-20 text-gray-400 hover:text-brand-pink transition-colors flex items-center gap-2 text-sm font-medium">
        <span>←</span> Back to Login
    </a>

    <div class="w-full max-w-md relative z-10 px-6">
        
        <div class="bg-[#150723]/80 backdrop-blur-xl border border-white/10 p-6 sm:p-8 rounded-3xl shadow-[0_0_50px_rgba(0,0,0,0.5)]">
            
            <div class="text-center mb-6">
                <div class="flex items-center justify-center gap-2 mb-2">
                    <span class="text-brand-pink text-2xl font-bold leading-none">VA</span>
                    <span class="text-white text-base font-bold tracking-widest mt-1">PILOT SERVICE</span>
                </div>
                <h1 class="text-xl font-bold tracking-tight">Create Account</h1>
                <p class="text-[10px] text-brand-purple font-mono mt-1 tracking-widest uppercase flex items-center justify-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span>
                    Secure Registration
                </p>
            </div>

            <form id="register-form" class="space-y-4">
                <div>
                    <label class="block text-[11px] font-medium text-gray-400 mb-1.5 uppercase tracking-wider">Full Name</label>
                    <div class="relative">
                        <input type="text" id="fullname" required placeholder="Caroline Channing" class="w-full bg-black/40 border border-white/10 rounded-xl pl-4 pr-10 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-brand-pink focus:ring-1 focus:ring-brand-pink transition-all">
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
                            </svg>
                        </span>
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-medium text-gray-400 mb-1.5 uppercase tracking-wider">Email</label>
                    <div class="relative">
                        <input type="email" id="email" required placeholder="commander@domain.com" class="w-full bg-black/40 border border-white/10 rounded-xl pl-4 pr-10 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-brand-pink focus:ring-1 focus:ring-brand-pink transition-all">
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm">✉</span>
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-medium text-gray-400 mb-1.5 uppercase tracking-wider">Password</label>
                    <div class="relative">
                        <input type="password" id="passcode" required placeholder="••••••••••••" class="w-full bg-black/40 border border-white/10 rounded-xl pl-4 pr-10 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-brand-pink focus:ring-1 focus:ring-brand-pink transition-all">
                        <button type="button" id="toggle-password" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white transition-colors focus:outline-none">
                            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-medium text-gray-400 mb-1.5 uppercase tracking-wider">Confirm Password</label>
                    <div class="relative">
                        <input type="password" id="confirm-passcode" required placeholder="••••••••••••" class="w-full bg-black/40 border border-white/10 rounded-xl pl-4 pr-10 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-brand-pink focus:ring-1 focus:ring-brand-pink transition-all">
                        <button type="button" id="toggle-confirm" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white transition-colors focus:outline-none">
                            <svg id="eye-icon-confirm" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <p id="error-msg" class="text-red-500 text-xs text-center hidden font-medium bg-red-500/10 py-2 px-3 rounded-lg border border-red-500/20"></p>

                <button type="submit" class="w-full bg-gradient-to-r from-brand-pink to-brand-purple hover:from-fuchsia-500 hover:to-purple-500 text-white font-bold py-3 rounded-xl transition-all shadow-[0_0_15px_rgba(224,0,255,0.3)] hover:shadow-[0_0_25px_rgba(224,0,255,0.6)] hover:-translate-y-0.5 mt-4 tracking-widest text-xs">
                    CREATE ACCOUNT
                </button>
            </form>

            <div class="mt-6 text-center text-xs text-gray-400 border-t border-white/5 pt-4">
                Already have an account? 
                <a href="login.html" class="text-brand-pink hover:text-white font-semibold transition-colors">Login</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="auth-otp.js"></script>
    <script>
        const API_BASE = window.API_BASE || 'https://va-s-pilot-service-management-system-production-d6a0.up.railway.app';

        async function apiJson(path, options = {}) {
            const response = await fetch(`${API_BASE}${path}`, {
                headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
                ...options
            });
            let data = {};
            try {
                data = await response.json();
            } catch (e) {
                data = {};
            }
            if (!response.ok || data.ok === false) {
                throw new Error(data.error || `Request failed (${response.status})`);
            }
            return data;
        }

        // Set up the password visibility toggles
        function setupPasswordToggle(btnId, inputId, iconId) {
            const toggleBtn = document.getElementById(btnId);
            const inputField = document.getElementById(inputId);
            const iconSvg = document.getElementById(iconId);

            toggleBtn.addEventListener('click', () => {
                const isPassword = inputField.getAttribute('type') === 'password';
                
                inputField.setAttribute('type', isPassword ? 'text' : 'password');
                
                if (isPassword) {
                    iconSvg.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />`;
                    toggleBtn.classList.add('text-brand-pink');
                    toggleBtn.classList.remove('text-gray-500');
                } else {
                    iconSvg.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />`;
                    toggleBtn.classList.remove('text-brand-pink');
                    toggleBtn.classList.add('text-gray-500');
                }
            });
        }

        // Initialize both toggles
        setupPasswordToggle('toggle-password', 'passcode', 'eye-icon');
        setupPasswordToggle('toggle-confirm', 'confirm-passcode', 'eye-icon-confirm');

        // Form Registration Logic
        const registerForm = document.getElementById('register-form');
        const errorMsg = document.getElementById('error-msg');

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.classList.remove('hidden');
            registerForm.classList.add('animate-pulse');
            setTimeout(() => registerForm.classList.remove('animate-pulse'), 500);
        }

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.add('hidden'); // Hide previous errors

            const fullname = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('passcode').value;
            const confirmPassword = document.getElementById('confirm-passcode').value;

            // 1. Passwords must match
            if (password !== confirmPassword) {
                showError("Passwords do not match.");
                return;
            }

            // 2. Validate Password Strength
            // At least 8 chars, 1 uppercase, 1 lowercase, 1 number, 1 special char (!@#$%&^)
            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&]).{8,}$/;
            if (!passwordRegex.test(password)) {
                showError("Password must be at least 8 characters and include an uppercase letter, a lowercase letter, a number, and a special character (!@#$%&^).");
                return;
            }

            const submitBtn = registerForm.querySelector('button[type="submit"]');
            try {
                if (submitBtn) {
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'SENDING OTP...';
                }

                // Check if the account already exists in MongoDB.
                let userExists = false;
                try {
                    await apiJson(`/api/users/${encodeURIComponent(email)}`);
                    userExists = true;
                } catch (err) {
                    userExists = false;
                }
                if (userExists) {
                    showError("An account with this email already exists.");
                    return;
                }

                const pendingUser = { fullname, email, password };
                localStorage.setItem('va_pilot_pending_user', JSON.stringify(pendingUser));

                await startOtpFlow(email, 'register', fullname);
                window.location.href = 'verify-otp.html';
            } catch (err) {
                showError(err.message || "Unable to send OTP right now. Please try again.");
            } finally {
                if (submitBtn) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'CREATE ACCOUNT';
                }
            }
        });
    </script>
    <script src="chat-widget.js"></script>
  <div id="page-loader" role="status" aria-live="polite" aria-busy="true">
    <div class="spinner" aria-hidden="true"></div>
    <span class="label">Loading...</span>
  </div>
  <script>
    window.addEventListener("load", function () {
      var loader = document.getElementById("page-loader");
      if (!loader) return;
      loader.classList.add("hidden");
      setTimeout(function () {
        if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
      }, 250);
    });
  </script>
</body>
</html>
