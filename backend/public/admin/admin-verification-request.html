                <p class="text-gray-400 mt-1">Review customer account verification submissions.</p>
            </header>

            <div id="requests" class="space-y-4"></div>
        </div>
    </main>

  <div id="image-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/80 p-4">
    <div class="max-w-4xl w-full">
      <button onclick="closeImageModal()" class="mb-3 px-3 py-2 rounded bg-white/10 hover:bg-white/20">Close</button>
      <img id="image-modal-preview" src="" alt="Preview" class="w-full max-h-[85vh] object-contain rounded-lg border border-white/20 bg-black">
    </div>
  </div>

  <script>
    const API_BASE = window.API_BASE || 'https://va-s-pilot-service-management-system-production-d6a0.up.railway.app';
    let requestsCache = [];
    let userNameByEmail = new Map();

    async function apiJson(path, options = {}) {
      const response = await fetch(`${API_BASE}${path}`, {
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        ...options
      });
      let data = {};
      try {
        data = await response.json();
      } catch (e) {
        data = {};
      }
      if (!response.ok || data.ok === false) {
        throw new Error(data.error || `Request failed (${response.status})`);
      }
      return data;
    }

    async function setRequestStatus(requestId, status) {
      if (status === 'Rejected') {
        const reason = prompt('Reason for verification rejection?');
        if (!reason || !reason.trim()) return;
        try {
          await apiJson(`/api/verifications/${encodeURIComponent(requestId)}/status`, {
            method: 'PATCH',
            body: JSON.stringify({ status: 'Rejected', reason: reason.trim() })
          });
          await render();
        } catch (err) {
          alert(err.message || 'Unable to reject verification request.');
        }
        return;
      }

      try {
        await apiJson(`/api/verifications/${encodeURIComponent(requestId)}/status`, {
          method: 'PATCH',
          body: JSON.stringify({ status: 'Approved' })
        });
        await render();
      } catch (err) {
        alert(err.message || 'Unable to approve verification request.');
      }
    }

    async function openImageModal(requestId, field) {
      try {
        const payload = await apiJson(`/api/verifications/${encodeURIComponent(requestId)}`);
        const request = payload.request || {};
        const src = request[field] || '';
        if (!src) {
          alert('Image not available.');
          return;
        }
        document.getElementById('image-modal-preview').src = src;
        document.getElementById('image-modal').classList.remove('hidden');
        document.getElementById('image-modal').classList.add('flex');
      } catch (err) {
        alert(err.message || 'Unable to load image.');
      }
    }

    function closeImageModal() {
      document.getElementById('image-modal').classList.add('hidden');
      document.getElementById('image-modal').classList.remove('flex');
    }

    async function render() {
      const container = document.getElementById('requests');
      try {
        const [verificationPayload, usersPayload] = await Promise.all([
          apiJson('/api/verifications?status=Pending&lite=1'),
          apiJson('/api/users').catch(() => ({ users: [] }))
        ]);
        requestsCache = verificationPayload.requests || [];
        userNameByEmail = new Map(
          (usersPayload.users || [])
            .map((u) => [
              String(u.email || '').trim().toLowerCase(),
              String([u.firstName, u.lastName].filter(Boolean).join(' ').trim() || u.fullname || u.name || '').trim()
            ])
            .filter(([email, name]) => email && name)
        );
      } catch (err) {
        container.innerHTML = `<div class="p-8 rounded-xl border border-red-500/20 bg-black/30 text-red-300">Unable to load verification requests: ${err.message || 'Request failed'}</div>`;
        return;
      }

      const list = requestsCache.filter((r) => {
        const status = String(r.status || 'Pending');
        return status === 'Pending';
      });
      if (!list.length) {
        container.innerHTML = '<div class="p-8 rounded-xl border border-white/10 bg-black/30 text-gray-400">No verification requests yet.</div>';
        return;
      }

      container.innerHTML = '';
      list.slice().reverse().forEach((r) => {
        const email = String(r.userEmail || '').trim().toLowerCase();
        const displayName = String(r.fullName || r.fullname || r.name || userNameByEmail.get(email) || '').trim() || 'Unknown User';
        const statusColor = r.status === 'Approved'
          ? 'text-green-400 border-green-400/30 bg-green-400/10'
          : r.status === 'Rejected'
            ? 'text-red-400 border-red-400/30 bg-red-400/10'
            : 'text-yellow-400 border-yellow-400/30 bg-yellow-400/10';

        const card = document.createElement('div');
        card.className = 'bg-black/40 border border-white/10 rounded-xl p-5';
        card.innerHTML = `
          <div class="flex flex-col md:flex-row md:items-center justify-between gap-3 mb-4">
            <div>
              <div class="text-lg font-bold">${displayName}</div>
              <div class="text-sm text-gray-400">${r.userEmail || 'No email'}</div>
            </div>
            <span class="px-3 py-1 rounded border text-xs font-bold uppercase tracking-wider ${statusColor}">${r.status || 'Pending'}</span>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-3 text-sm mb-4">
            <div class="bg-white/5 border border-white/10 rounded-lg p-3"><div class="text-gray-500 text-xs">Phone</div><div>${r.phoneNumber || 'N/A'}</div></div>
            <div class="bg-white/5 border border-white/10 rounded-lg p-3"><div class="text-gray-500 text-xs">ID Type</div><div>${r.govIdType || 'N/A'}</div></div>
            <div class="bg-white/5 border border-white/10 rounded-lg p-3"><div class="text-gray-500 text-xs">ID Number</div><div>${r.govIdNumber || 'N/A'}</div></div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
            <button type="button" onclick="openImageModal('${r.id}','govIdPhoto')" class="text-left w-full h-48 rounded-lg border border-white/10 bg-black/30 hover:border-brand-pink/40 transition-all flex items-center justify-center text-sm text-gray-300">
              View ID Photo
            </button>
            <button type="button" onclick="openImageModal('${r.id}','selfieWithId')" class="text-left w-full h-48 rounded-lg border border-white/10 bg-black/30 hover:border-brand-pink/40 transition-all flex items-center justify-center text-sm text-gray-300">
              View Selfie
            </button>
          </div>
          ${r.reason ? `<div class="text-sm text-red-300 mb-3">Reason: ${r.reason}</div>` : ''}
          ${r.status === 'Pending' ? `<div class="flex gap-3"><button onclick="setRequestStatus('${r.id}','Approved')" class="px-4 py-2 rounded-lg bg-green-500 hover:bg-green-400 text-black font-bold">Approve</button><button onclick="setRequestStatus('${r.id}','Rejected')" class="px-4 py-2 rounded-lg bg-red-500/20 border border-red-500/40 text-red-300 hover:bg-red-500/30">Reject</button></div>` : ''}
        `;
        container.appendChild(card);
      });
    }

    document.addEventListener('DOMContentLoaded', render);
  </script>
