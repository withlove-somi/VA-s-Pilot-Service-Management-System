  <main class="flex-1 h-full flex flex-col md:flex-row gap-6 z-10 p-6 md:px-10">
    <aside class="w-full flex-1 md:flex-[2] h-full bg-[#150723]/90 border border-white/10 rounded-2xl p-6 overflow-y-auto">
      <div class="px-2 py-3 border-b border-white/10 mb-4">
        <div class="text-xl font-bold">Customers</div>
        <div class="text-xs text-gray-400">Select a customer to chat</div>
      </div>
      <div id="customers" class="space-y-3"></div>
    </aside>

    <section id="chat-panel" class="hidden flex-1 md:flex-[3] h-full flex flex-col bg-[#150723]/60 border border-white/10 rounded-2xl overflow-hidden">
      <header class="px-6 py-4 border-b border-white/10 flex items-center justify-between gap-3">
        <a id="profile-link" href="admin-customer-profile.html" class="flex items-center gap-3 transition-colors">
          <div id="chat-avatar" class="w-10 h-10 rounded-full bg-brand-purple/20 border border-brand-purple/40 text-brand-purple flex items-center justify-center font-bold overflow-hidden relative">
            <img id="chat-avatar-img" alt="Customer profile photo" class="hidden w-full h-full object-cover">
            <span id="chat-avatar-fallback">?</span>
          </div>
          <div>
            <div id="chat-name" class="text-lg font-bold">No customer selected</div>
            <div id="chat-email" class="text-xs text-gray-400">Choose a customer from the left panel</div>
          </div>
        </a>
        <button id="chat-delete" type="button" class="px-4 py-2 rounded-lg bg-red-500/15 hover:bg-red-500/25 border border-red-500/40 text-red-200 text-xs font-semibold">
          Delete Chat
        </button>
      </header>
      <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-3"></div>
      <form id="chat-form" class="p-4 border-t border-white/10 flex gap-3">
        <input id="chat-input" type="text" placeholder="Type message..." class="flex-1 bg-black/40 border border-white/10 rounded-lg px-4 py-3 outline-none focus:border-brand-pink" />
        <button id="chat-send" type="submit" class="px-5 py-3 rounded-lg bg-gradient-to-r from-brand-pink to-brand-purple font-bold">Send</button>
      </form>
    </section>
  </main>

  <script>
    const API_BASE = 'https://va-s-pilot-service-management-system-production-d6a0.up.railway.app';
    const socket = io(API_BASE); // Connects to the live Socket.io server

    async function apiJson(path, options = {}) {
      const response = await fetch(`${API_BASE}${path}`, {
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        ...options
      });
      let data = {};
      try { data = await response.json(); } catch (e) { data = {}; }
      if (!response.ok || data.ok === false) {
        throw new Error(data.error || `Request failed (${response.status})`);
      }
      return data;
    }

    let selectedEmail = '';
    let allUsers = [];

    function setSelectedEmail(email) {
      selectedEmail = email;
      highlightSelected();
      document.getElementById('chat-panel').classList.remove('hidden');
      renderChatHeader();
      
      // Tell Railway we are listening to this customer's chat room!
      socket.emit('joinChat', email); 
      
      renderMessages();
    }

    function highlightSelected() {
      document.querySelectorAll('[data-customer]').forEach((card) => {
        const email = card.getAttribute('data-customer');
        if (email === selectedEmail) card.classList.add('border-brand-pink/50');
        else card.classList.remove('border-brand-pink/50');
      });
    }

    function renderChatHeader() {
      const nameEl = document.getElementById('chat-name');
      const emailEl = document.getElementById('chat-email');
      const profileLink = document.getElementById('profile-link');
      const avatarImg = document.getElementById('chat-avatar-img');
      const avatarFallback = document.getElementById('chat-avatar-fallback');
      const user = allUsers.find((u) => String(u.email || '').trim().toLowerCase() === selectedEmail);
      
      if (!selectedEmail || !user) {
        nameEl.textContent = 'No customer selected';
        emailEl.textContent = 'Choose a customer from the left panel';
        profileLink.classList.add('pointer-events-none', 'opacity-40');
        avatarImg.classList.add('hidden');
        avatarFallback.textContent = '?';
        avatarFallback.classList.remove('hidden');
        return;
      }
      
      const displayName = user.fullname || user.name || 'Customer';
      nameEl.textContent = displayName;
      emailEl.textContent = selectedEmail;
      profileLink.classList.remove('pointer-events-none', 'opacity-40');
      profileLink.href = `admin-customer-profile.html?email=${encodeURIComponent(selectedEmail)}`;
      
      const initials = displayName.split(' ').filter(Boolean).slice(0, 2).map((part) => part[0].toUpperCase()).join('') || 'CU';
      if (user.profileImage) {
        avatarImg.src = user.profileImage;
        avatarImg.classList.remove('hidden');
        avatarFallback.classList.add('hidden');
      } else {
        avatarImg.classList.add('hidden');
        avatarFallback.textContent = initials;
        avatarFallback.classList.remove('hidden');
      }
    }

    // Helper to draw the message bubbles
    function appendMessageToBox(msg, box) {
      const isAdmin = msg.sender === 'admin';
      const row = document.createElement('div');
      row.className = `flex ${isAdmin ? 'justify-end' : 'justify-start'}`;
      row.innerHTML = `
        <div class="max-w-[70%] px-4 py-2 rounded-lg ${isAdmin ? 'bg-brand-purple/20 border border-brand-purple/40' : 'bg-white/5 border border-white/10'}">
          <div class="text-sm">${msg.message || msg.text}</div>
          <div class="text-[10px] text-gray-500 mt-1">${new Date(msg.createdAt || Date.now()).toLocaleString()}</div>
        </div>
      `;
      box.appendChild(row);
    }

    // Load messages from the live database
    async function renderMessages() {
      const box = document.getElementById('messages');
      const input = document.getElementById('chat-input');
      const sendBtn = document.getElementById('chat-send');

      if (!selectedEmail) {
        box.innerHTML = '<p class="text-gray-500">Select a customer from the left panel.</p>';
        input.disabled = true;
        sendBtn.disabled = true;
        return;
      }

      input.disabled = false;
      sendBtn.disabled = false;
      box.innerHTML = '<p class="text-gray-500">Loading messages from server...</p>';

      try {
        const payload = await apiJson(`/api/messages?userEmail=${encodeURIComponent(selectedEmail)}`);
        const thread = payload.messages || [];

        if (!thread.length) {
          box.innerHTML = '<p class="text-gray-500">No messages yet.</p>';
          return;
        }

        box.innerHTML = '';
        thread.forEach((msg) => appendMessageToBox(msg, box));
        box.scrollTop = box.scrollHeight;
      } catch (error) {
        box.innerHTML = '<p class="text-red-500">Failed to load messages.</p>';
      }
    }

    // Load customers list (This is the missing function!)
    async function renderInbox() {
      const container = document.getElementById('customers');
      try {
        const usersPayload = await apiJson('/api/users');
        const users = usersPayload.users || [];
        const validUsers = users.filter((u) => u.email && String(u.role || 'customer').toLowerCase() !== 'admin');
        
        if (!validUsers.length) {
          container.innerHTML = '<div class="p-8 rounded-xl border border-white/10 bg-black/30 text-gray-400">No customers found.</div>';
          return;
        }

        allUsers = validUsers;
        container.innerHTML = '';
        validUsers.forEach((u) => {
          const email = String(u.email || '').trim().toLowerCase();
          const name = (u.fullname || u.name || 'Customer').trim();
          const initials = name.split(' ').filter(Boolean).slice(0, 2).map((part) => part[0].toUpperCase()).join('');
          
          const avatarContent = u.profileImage
            ? `<img src="${u.profileImage}" alt="${name}" class="w-full h-full object-cover">`
            : `<span class="text-brand-purple font-bold">${initials || 'CU'}</span>`;
            
          const card = document.createElement('div');
          card.className = 'bg-black/40 border border-white/10 rounded-2xl p-4 hover:border-brand-pink/40 hover:bg-white/5 transition-all cursor-pointer';
          card.setAttribute('data-customer', email);
          card.innerHTML = `
            <div class="flex items-start justify-between gap-4">
              <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-full bg-brand-purple/20 border border-brand-purple/40 flex items-center justify-center overflow-hidden">
                  ${avatarContent}
                </div>
                <div>
                  <div class="font-bold text-lg">${name}</div>
                  <div class="text-sm text-gray-400">${email}</div>
                </div>
              </div>
            </div>
          `;
          card.addEventListener('click', () => setSelectedEmail(email));
          container.appendChild(card);
        });

        // Preselect customer if URL has ?email=
        const params = new URLSearchParams(window.location.search);
        const preselect = String(params.get('email') || '').trim().toLowerCase();
        if (preselect) setSelectedEmail(preselect);

      } catch (err) {
        container.innerHTML = `<div class="p-8 text-red-300">Unable to load inbox.</div>`;
      }
    }

    // Send message to live API
    document.getElementById('chat-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!selectedEmail) return;

      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;

      input.value = ''; // Clear input instantly

      try {
        await apiJson('/api/messages', {
          method: 'POST',
          body: JSON.stringify({ userEmail: selectedEmail, sender: 'admin', message: text })
        });
      } catch (error) {
        console.error("Failed to send message:", error);
      }
    });

    // Listen for instant Socket.io updates!
    socket.on("newMessage", (msg) => {
      if (msg.userEmail === selectedEmail) {
        const box = document.getElementById('messages');
        if (box.innerHTML.includes("No messages yet")) box.innerHTML = '';
        appendMessageToBox(msg, box);
        box.scrollTop = box.scrollHeight;
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      renderInbox();
      setInterval(() => {
        if (selectedEmail) renderMessages();
      }, 3000);
    });
  </script>
