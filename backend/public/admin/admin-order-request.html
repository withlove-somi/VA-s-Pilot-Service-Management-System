<body class="bg-brand-bg text-white font-sans antialiased selection:bg-brand-pink selection:text-white h-screen flex relative overflow-hidden">

        <div class="p-6 border-b border-white/10 flex items-center gap-2">
            <span class="text-brand-pink text-3xl font-bold leading-none">VA</span>
            <span class="text-white text-sm font-bold tracking-widest mt-1 leading-tight">ADMIN<br>PORTAL</span>

        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <a href="admin-dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-brand-purple/10 text-brand-purple border border-brand-purple/20 shadow-[0_0_15px_rgba(122,0,255,0.1)] transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" /></svg>
                <span class="font-semibold tracking-wide text-sm">Dashboard</span>

            <a href="admin-order-request.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                <span class="font-medium tracking-wide text-sm">Order Request</span>

            <a href="admin-orders.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all">

            <a href="admin-completed.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>

            </a>
            <a href="admin-verification-request.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" /></svg>
                <span class="font-medium tracking-wide text-sm">Verification Request</span>
            </a>
            <a href="admin-inbox.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 13.5h3.86a2.25 2.25 0 012.012 1.244l.256.512a2.25 2.25 0 002.013 1.244h3.218a2.25 2.25 0 002.013-1.244l.256-.512a2.25 2.25 0 012.013-1.244h3.859m-19.5.338V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18v-4.162c0-.224-.034-.447-.1-.661L19.24 5.338a2.25 2.25 0 00-2.15-1.588H6.911a2.25 2.25 0 00-2.15 1.588L2.35 12.839c-.066.214-.1.437-.1.661z" /></svg>
                <span class="font-medium tracking-wide text-sm">Inbox</span>
            </a>

        <div class="p-4 border-t border-white/10 mt-auto">
            <a href="admin-login.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:text-white hover:bg-red-500/20 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" /></svg>
                <span class="font-medium tracking-wide text-sm">Log Out</span>
            </a>
        </div>
    </aside>

    <main class="flex-1 h-full overflow-y-auto z-10 p-6 md:px-10">
        <div class="max-w-6xl w-full mx-auto py-6">
            <header class="mb-10">
                <h1 class="text-3xl font-bold tracking-tight text-white">Pending Deployments.</h1>
                <p class="text-gray-400 mt-1">Review incoming boosting requests before accepting contracts.</p>
            </header>

            <div id="admin-orders-list" class="space-y-6">
                </div>
        </div>
    </main>

    <script>
        const API_BASE = window.API_BASE || 'https://va-s-pilot-service-management-system-production-d6a0.up.railway.app';
        let ordersCache = [];
        let usersByEmail = new Map();

        async function apiJson(path, options = {}) {
            const response = await fetch(`${API_BASE}${path}`, {
                headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
                ...options
            });
            let data = {};
            try {
                data = await response.json();
            } catch (e) {
                data = {};
            }
            if (!response.ok || data.ok === false) {
                throw new Error(data.error || `Request failed (${response.status})`);
            }
            return data;
        }

        async function loadAdminOrders() {
            const container = document.getElementById('admin-orders-list');
            try {
                const [ordersPayload, usersPayload] = await Promise.all([
                    apiJson('/api/orders'),
                    apiJson('/api/users')
                ]);
                ordersCache = ordersPayload.orders || [];
                const users = usersPayload.users || [];
                usersByEmail = new Map(
                    users.map((user) => [String(user.email || '').toLowerCase(), user])
                );
            } catch (err) {
                container.innerHTML = `<div class="bg-black/40 border border-red-500/30 rounded-2xl p-8 text-center text-red-300 text-sm">Unable to load orders: ${err.message || 'Request failed'}</div>`;
                return;
            }

            // FILTER: Only show new orders pending approval
            const activeOrders = ordersCache.filter(order => !order.status || order.status === 'pending_approval');

            if (activeOrders.length === 0) {
                container.innerHTML = `<div class="bg-black/40 border border-white/10 rounded-2xl p-12 text-center text-gray-500 font-bold uppercase tracking-[0.2em] text-[10px]">No new order requests in queue.</div>`;
                return;
            }

            container.innerHTML = '';

            activeOrders.forEach(order => {
                const statusColor = "text-yellow-400 border-yellow-400/20 bg-yellow-400/5";
                const currentStatus = order.status || "pending_approval";
                const emailKey = String(order.customerEmail || order.customer_email || '').toLowerCase();
                const customer = usersByEmail.get(emailKey);
                const displayName = (() => {
                    if (!customer) return order.customerEmail || 'Standard Pilot';
                    const full = [customer.firstName, customer.lastName].filter(Boolean).join(' ').trim();
                    return full || customer.fullname || customer.name || customer.email || 'Standard Pilot';
                })();
                const adminActions = `
                    <button onclick="updateStatus('${order.id}', 'awaiting_payment')" class="w-full px-8 py-3 bg-brand-purple hover:bg-brand-purple/80 text-white rounded-lg font-bold text-[10px] uppercase tracking-widest transition-all shadow-[0_0_15px_rgba(122,0,255,0.2)]">Accept Mission</button>
                    <button onclick="declineOrder('${order.id}')" class="w-full px-8 py-3 bg-red-500/10 border border-red-500/20 text-red-500 hover:bg-red-500 hover:text-white rounded-lg font-bold text-[10px] uppercase tracking-widest transition-all">Decline</button>
                `;

                const card = document.createElement('div');
                card.className = "flex flex-col gap-3 w-full";
                card.innerHTML = `
                    <div class="bg-black/40 backdrop-blur-md border border-white/10 rounded-xl p-6 md:p-8 shadow-xl flex flex-col md:flex-row justify-between items-center gap-6 relative overflow-hidden w-full group hover:border-brand-purple/40 transition-all">
                        <div class="flex-1 w-full">
                            <div class="flex items-center justify-between mb-4">
                                <span class="text-[11px] font-bold text-gray-500 tracking-[0.2em] uppercase">Order ID: ${order.id}</span>
                                <span class="text-[11px] font-bold uppercase tracking-widest ${statusColor} px-3 py-1.5 rounded border">${currentStatus}</span>
                            </div>
                            
                            <div class="flex items-center gap-5 mb-6">
                                <div class="w-14 h-14 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-brand-pink shrink-0">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                                </div>
                                <div>
                                    <div class="flex flex-wrap items-center gap-2">
                                        <h3 class="text-2xl font-bold text-white tracking-tight">${displayName}</h3>
                                        <span class="text-[10px] font-bold uppercase tracking-widest px-2 py-0.5 rounded border ${order.customerVerified ? 'text-green-300 border-green-400/30 bg-green-400/10' : 'text-yellow-300 border-yellow-400/30 bg-yellow-400/10'}">
                                            ${order.customerVerified ? 'Verified' : 'Unverified'}
                                        </span>
                                    </div>
                                    <p class="text-sm text-gray-500 font-medium">Requested: ${order.date || 'Today'}</p>
                                </div>
                            </div>

                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 bg-white/[0.02] p-4 rounded-lg border border-white/5">
                                <div>
                                    <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Game</span>
                                    <span class="text-sm font-semibold text-white">${order.game || 'Boost Service'}</span>
                                </div>
                                <div>
                                    <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">IGN</span>
                                    <span class="text-sm font-semibold text-white truncate block">${order.ign || 'N/A'}</span>
                                </div>
                                <div>
                                    <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Account ID</span>
                                    <span class="text-sm font-semibold text-white">${order.accountId || 'N/A'}</span>
                                </div>
                                <div>
                                    <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Server ID</span>
                                    <span class="text-sm font-semibold text-white">${order.serverId || 'N/A'}</span>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4 bg-white/[0.02] p-4 rounded-lg border border-white/5">
                                <div>
                                    <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Login Method</span>
                                    <span class="text-sm font-semibold text-white">${order.pilotLoginMethod || 'N/A'}</span>
                                </div>
                                <div>
                                    <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Email</span>
                                    <span class="text-sm font-semibold text-white">${order.pilotLoginEmail || 'N/A'}</span>
                                </div>
                                <div>
                                    <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Password</span>
                                    <span class="text-sm font-semibold text-white">${order.pilotLoginPassword || 'N/A'}</span>
                                </div>
                                <div>
                                    <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Contact Number</span>
                                    <span class="text-sm font-semibold text-white">${order.pilotLoginNumber || 'N/A'}</span>
                                </div>
                                <div>
                                    <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Current Rank</span>
                                    <span class="text-sm font-semibold text-gray-300">${order.currentRank || 'N/A'}</span>
                                </div>
                                <div>
                                    <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Target Rank</span>
                                    <span class="text-sm font-semibold text-white">${order.targetRank || 'N/A'}</span>
                                </div>
                                <div>
                                    <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Stars Needed</span>
                                    <span class="text-sm font-semibold text-white">${order.starsNeeded || 'N/A'}</span>
                                </div>
                                <div>
                                    <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Total</span>
                                    <span class="text-sm font-semibold text-brand-pink">₱${order.totalPrice || '0.00'}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="w-full md:w-auto flex flex-col items-center md:items-end md:pl-10 md:border-l border-white/10 shrink-0">
                            <span class="text-[11px] text-gray-500 uppercase font-bold tracking-widest mb-1.5">Total Payment</span>
                            <span class="text-3xl font-black text-white mb-5">₱${order.totalPrice || '0.00'}</span>
                            <div class="w-full md:w-auto flex flex-col gap-3 items-center">${adminActions}</div>
                            <div class="w-full md:w-auto mt-3">
                                <a id="message-client" href="admin-chat.html?email=${encodeURIComponent(order.customerEmail || order.customer_email || '')}" class="group flex items-center justify-center gap-3 w-full md:w-auto px-6 py-3 bg-white/5 hover:bg-white/10 border border-white/10 text-white rounded-lg font-bold text-[10px] uppercase tracking-widest transition-all">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 text-brand-pink group-hover:scale-110 transition-transform"><path stroke-linecap="round" stroke-linejoin="round" d="M12 20.25c4.97 0 9-3.694 9-8.25s-4.03-8.25-9-8.25S3 7.444 3 12c0 2.104.859 4.023 2.273 5.48.432.447.74 1.04.586 1.641a4.483 4.483 0 01-.923 1.785 0.5.5 0 00.37.818 9.03 9.03 0 003.748-.976c.5-.27.428-.593.633-.74a9.385 9.385 0 014.313-1.048z" /></svg>
                                    Message Client
                                </a>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function updateStatus(orderId, newStatus) {
            try {
                await apiJson(`/api/orders/${encodeURIComponent(orderId)}/status`, {
                    method: 'PATCH',
                    body: JSON.stringify({ status: newStatus })
                });
                await loadAdminOrders();
            } catch (err) {
                alert(err.message || 'Unable to update order status.');
            }
        }

        function requireReason(actionLabel) {
            const reason = prompt(`Please enter a reason for "${actionLabel}":`);
            if (!reason || !reason.trim()) {
                alert('Reason is required.');
                return null;
            }
            return reason.trim();
        }

        async function declineOrder(orderId) {
            const reason = requireReason("Decline Order");
            if (!reason) return;

            try {
                await apiJson(`/api/orders/${encodeURIComponent(orderId)}/status`, {
                    method: 'PATCH',
                    body: JSON.stringify({ status: 'declined_order', reason })
                });
                await loadAdminOrders();
            } catch (err) {
                alert(err.message || 'Unable to decline order.');
            }
        }

        document.addEventListener('DOMContentLoaded', loadAdminOrders);
    </script>
    <script src="sidebar-active.js"></script>
</body>
</html>
