<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

        tailwind.config = {

                    fontFamily: {

                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
                    },
                    colors: {
                        'brand-bg': '#0f0518',
                        'brand-pink': '#e000ff',
                        'brand-purple': '#7a00ff',
                    }
                }
            }
        }
    </script>
  <script src="/js/config.js"></script>
</head>
<body class="bg-brand-bg text-white font-sans antialiased selection:bg-brand-pink selection:text-white h-screen flex relative overflow-hidden">

    <aside class="w-64 h-full flex flex-col bg-[#150723]/90 backdrop-blur-2xl border-r border-white/10 relative z-20 hidden md:flex shrink-0">
        <div class="p-6 border-b border-white/10 flex items-center gap-2">
            <span class="text-brand-pink text-3xl font-bold leading-none">VA</span>
            <span class="text-white text-sm font-bold tracking-widest mt-1 leading-tight">ADMIN<br>PORTAL</span>
        </div>
        
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <a href="admin-dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-brand-purple/10 text-brand-purple border border-brand-purple/20 shadow-[0_0_15px_rgba(122,0,255,0.1)] transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" /></svg>
                <span class="font-semibold tracking-wide text-sm">Dashboard</span>
            </a>
            <a href="admin-order-request.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                <span class="font-medium tracking-wide text-sm">Order Request</span>
            </a>
            <a href="admin-orders.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zM3.75 12h.007v.008H3.75V12zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm-.375 5.25h.007v.008H3.75v-.008zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" /></svg>
                <span class="font-medium tracking-wide text-sm">Orders</span>
            </a>
            <a href="admin-completed.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                <span class="font-medium tracking-wide text-sm">Completed</span>
            </a>
            <a href="admin-verification-request.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" /></svg>
                <span class="font-medium tracking-wide text-sm">Verification Request</span>
            </a>
            <a href="admin-inbox.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 13.5h3.86a2.25 2.25 0 012.012 1.244l.256.512a2.25 2.25 0 002.013 1.244h3.218a2.25 2.25 0 002.013-1.244l.256-.512a2.25 2.25 0 012.013-1.244h3.859m-19.5.338V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18v-4.162c0-.224-.034-.447-.1-.661L19.24 5.338a2.25 2.25 0 00-2.15-1.588H6.911a2.25 2.25 0 00-2.15 1.588L2.35 12.839c-.066.214-.1.437-.1.661z" /></svg>
                <span class="font-medium tracking-wide text-sm">Inbox</span>
            </a>
        </nav>

        <div class="p-4 border-t border-white/10 mt-auto">
            <a href="admin-login.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:text-white hover:bg-red-500/20 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" /></svg>
                <span class="font-medium tracking-wide text-sm">Log Out</span>
            </a>
        </div>
    </aside>

    <main class="flex-1 h-full overflow-y-auto z-10 p-6 md:px-10">
        <div class="max-w-6xl w-full mx-auto py-6">
            <header class="mb-10">
                <h1 class="text-3xl font-bold tracking-tight text-white">Archived Missions.</h1>
                <p class="text-gray-400 mt-1">Review successfully finalized deployments and past contract logs.</p>
            </header>

            <div id="completed-orders-list" class="space-y-6">
                </div>
        </div>
    </main>

    <script>
        const API_BASE = window.API_BASE || 'https://va-s-pilot-service-management-system-production-d6a0.up.railway.app';

        async function apiJson(path, options = {}) {
            const response = await fetch(`${API_BASE}${path}`, {
                headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
                ...options
            });
            let data = {};
            try {
                data = await response.json();
            } catch (e) {
                data = {};
            }
            if (!response.ok || data.ok === false) {
                throw new Error(data.error || `Request failed (${response.status})`);
            }
            return data;
        }

        async function loadCompletedOrders() {
            const container = document.getElementById('completed-orders-list');
            let allOrders = [];
            try {
                const payload = await apiJson('/api/orders');
                allOrders = payload.orders || [];
            } catch (err) {
                container.innerHTML = `<div class="bg-black/40 border border-red-500/30 rounded-2xl p-8 text-center text-red-300 text-sm">Unable to load orders: ${err.message || 'Request failed'}</div>`;
                return;
            }
            
            // FILTER: Only show orders with the 'Completed' status
            const completedOrders = allOrders.filter(order => String(order.status || '').trim().toLowerCase() === 'completed');

            if (completedOrders.length === 0) {
                container.innerHTML = `
                    <div class="bg-black/40 border border-white/10 rounded-2xl p-12 text-center flex flex-col items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-12 h-12 text-gray-600 mb-4"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 14.15v4.25c0 1.094-.787 2.036-1.872 2.18-2.087.277-4.216.42-6.378.42s-4.291-.143-6.378-.42c-1.085-.144-1.872-1.086-1.872-2.18v-4.25m16.5 0a2.18 2.18 0 00.75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 00-3.413-.387m4.5 8.006c-.194.165-.42.295-.673.38A23.978 23.978 0 0112 15.75c-2.648 0-5.195-.429-7.577-1.22a2.016 2.016 0 01-.673-.38m0 0A2.18 2.18 0 013 12.489V8.706c0-1.081.768-2.015 1.837-2.175a48.111 48.111 0 013.413-.387m7.5 0V5.25A2.25 2.25 0 0013.5 3h-3a2.25 2.25 0 00-2.25 2.25v.894m7.5 0a48.667 48.667 0 00-7.5 0M12 12.75h.008v.008H12v-.008z" /></svg>
                        <span class="text-gray-500 font-bold uppercase tracking-[0.2em] text-[10px]">No finalized missions yet.</span>
                    </div>`;
                return;
            }

            container.innerHTML = '';

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text == null ? '' : String(text);
                return div.innerHTML;
            }

            completedOrders.reverse().forEach((order, index) => {
                const statusKey = String(order.status || '').trim().toLowerCase();
                const statusLabelMap = {
                    completed: 'Completed',
                    cancelled: 'Cancelled',
                    declined_order: 'Declined',
                    expired: 'Expired'
                };
                const badgeStyle = statusKey === 'completed'
                    ? "bg-green-500/10 text-green-400 border-green-500/20"
                    : "bg-red-500/10 text-red-400 border-red-500/20";

                const reason =
                    String(order.rejectionReason || order.lastActionReason || order.declineReason || "").trim();
                const prettyDate = order.updatedAt || order.createdAt
                    ? new Date(order.updatedAt || order.createdAt).toLocaleString()
                    : (order.date || '-');
                const displayId = order.id || order._id || 'order';
                const cardId = `completed-${index}-${displayId}`;

                const card = document.createElement('div');
                card.className = "bg-black/40 backdrop-blur-md border border-white/10 rounded-xl transition-all hover:border-white/20";
                card.innerHTML = `
                    <button type="button" class="w-full text-left p-5 flex flex-col md:flex-row justify-between items-center gap-4" data-accordion-trigger="${cardId}">
                        <div class="flex items-center gap-4 w-full md:w-auto">
                            <div class="w-12 h-12 rounded-lg bg-white/5 border border-white/10 flex items-center justify-center shrink-0">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z" /></svg>
                            </div>
                            <div>
                                <div class="flex items-center gap-3">
                                    <h4 class="font-bold text-white">${escapeHtml(order.game || 'Boost Service')}</h4>
                                    <span class="px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-widest border ${badgeStyle}">${escapeHtml(statusLabelMap[statusKey] || order.status)}</span>
                                </div>
                                <p class="text-xs text-gray-500 mt-1">Order ID: <span class="text-gray-400">${escapeHtml(displayId)}</span> • Date: ${escapeHtml(prettyDate)}</p>
                            </div>
                        </div>
                        <div class="w-full md:w-auto text-left md:text-right flex items-center gap-3">
                            <div class="flex flex-col justify-center">
                                <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Amount</span>
                                <span class="text-lg font-bold text-white">₱${escapeHtml(order.totalPrice || '0.00')}</span>
                            </div>
                            <svg class="w-4 h-4 text-gray-500 transition-transform" data-accordion-chevron="${cardId}" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                        </div>
                    </button>

                    <div class="px-5 pb-5 overflow-hidden max-h-0 opacity-0 transition-all duration-300" data-accordion-panel="${cardId}">
                        <div class="mt-2 grid grid-cols-1 md:grid-cols-2 gap-4 bg-white/[0.02] p-4 rounded-lg border border-white/5">
                            <div>
                                <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Game</span>
                                <span class="text-sm font-semibold text-white">${escapeHtml(order.game || 'Boost Service')}</span>
                            </div>
                            <div>
                                <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">IGN</span>
                                <span class="text-sm font-semibold text-white">${escapeHtml(order.ign || 'N/A')}</span>
                            </div>
                            <div>
                                <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Account ID</span>
                                <span class="text-sm font-semibold text-white">${escapeHtml(order.accountId || 'N/A')}</span>
                            </div>
                            <div>
                                <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Server ID</span>
                                <span class="text-sm font-semibold text-white">${escapeHtml(order.serverId || 'N/A')}</span>
                            </div>
                            <div>
                                <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Login Method</span>
                                <span class="text-sm font-semibold text-white">${escapeHtml(order.pilotLoginMethod || 'N/A')}</span>
                            </div>
                            <div>
                                <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Login Email</span>
                                <span class="text-sm font-semibold text-white">${escapeHtml(order.pilotLoginEmail || 'N/A')}</span>
                            </div>
                            <div>
                                <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Login Password</span>
                                <span class="text-sm font-semibold text-white">${escapeHtml(order.pilotLoginPassword || 'N/A')}</span>
                            </div>
                            <div>
                                <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Contact Number</span>
                                <span class="text-sm font-semibold text-white">${escapeHtml(order.pilotLoginNumber || 'N/A')}</span>
                            </div>
                            <div>
                                <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Current Rank</span>
                                <span class="text-sm font-semibold text-white">${escapeHtml(order.currentRank || 'N/A')}</span>
                            </div>
                            <div>
                                <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Target Rank</span>
                                <span class="text-sm font-semibold text-white">${escapeHtml(order.targetRank || 'N/A')}</span>
                            </div>
                            <div>
                                <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Stars Needed</span>
                                <span class="text-sm font-semibold text-white">${escapeHtml(order.starsNeeded || 'N/A')}</span>
                            </div>
                            <div>
                                <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1">Total Price</span>
                                <span class="text-sm font-semibold text-white">₱${escapeHtml(order.totalPrice || '0.00')}</span>
                            </div>
                        </div>

                        ${reason ? `
                        <div class="mt-4 bg-red-500/10 border border-red-500/20 rounded-lg p-4">
                            <div class="text-[10px] uppercase font-bold tracking-widest text-red-300 mb-1">Reason</div>
                            <div class="text-sm text-red-100">${escapeHtml(reason)}</div>
                        </div>` : ""}
                    </div>
                `;
                container.appendChild(card);
            });

            if (!container.dataset.accordionBound) {
                container.addEventListener('click', (event) => {
                    const trigger = event.target.closest('[data-accordion-trigger]');
                    if (!trigger) return;
                    const id = trigger.getAttribute('data-accordion-trigger');
                    const panel = container.querySelector(`[data-accordion-panel="${id}"]`);
                    const chevron = container.querySelector(`[data-accordion-chevron="${id}"]`);
                    if (!panel) return;
                    const isOpen = panel.classList.contains('max-h-[1000px]');
                    panel.classList.toggle('max-h-0', isOpen);
                    panel.classList.toggle('opacity-0', isOpen);
                    panel.classList.toggle('max-h-[1000px]', !isOpen);
                    panel.classList.toggle('opacity-100', !isOpen);
                    if (chevron) {
                        chevron.classList.toggle('rotate-180', !isOpen);
                    }
                });
                container.dataset.accordionBound = "true";
            }
        }

        document.addEventListener('DOMContentLoaded', loadCompletedOrders);
    </script>
    <script src="sidebar-active.js"></script>
</body>
</html>
