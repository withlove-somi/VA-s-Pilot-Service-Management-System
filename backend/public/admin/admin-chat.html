                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" /></svg>

  <aside class="w-60 h-full bg-[#150723]/90 border-r border-white/10 p-3 overflow-y-auto z-10">
    <div class="px-2 py-2 border-b border-white/10 mb-3">
      <div class="text-lg font-bold">Inbox</div>
      <div class="text-[11px] text-gray-400">Select a customer to chat</div>
    </div>
    <div id="thread-list" class="space-y-2"></div>
  </aside>

  <main class="flex-1 h-full flex flex-col z-10 mr-6 md:mr-10">
    <header class="px-6 py-4 border-b border-white/10 bg-[#150723]/60 flex items-center justify-between gap-3">
      <div class="flex items-center gap-3">
        <a href="admin-inbox.html" class="w-10 h-10 rounded-full border border-white/10 hover:border-white/30 bg-white/5 hover:bg-white/10 flex items-center justify-center transition-colors" aria-label="Back to inbox">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15 18l-6-6 6-6"></path>
          </svg>
        </a>
        <div id="chat-avatar" class="w-10 h-10 rounded-full bg-brand-purple/20 border border-brand-purple/40 text-brand-purple flex items-center justify-center font-bold overflow-hidden relative">
          <img id="chat-avatar-img" alt="Customer profile photo" class="hidden w-full h-full object-cover">
          <span id="chat-avatar-fallback">?</span>
        </div>
        <div>
          <div id="chat-name" class="text-lg font-bold">No customer selected</div>
          <div id="chat-email" class="text-xs text-gray-400">Choose from inbox list</div>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <a id="profile-link" href="admin-customer-profile.html" class="w-10 h-10 rounded-full border border-white/20 hover:border-brand-pink/60 text-gray-300 hover:text-brand-pink flex items-center justify-center transition-colors" aria-label="View profile">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="4" width="18" height="16" rx="2"></rect>
            <circle cx="9" cy="10" r="2.5"></circle>
            <path d="M14 8h5"></path>
            <path d="M14 12h5"></path>
            <path d="M6.5 16h10"></path>
          </svg>
        </a>
        <button id="delete-chat-btn" type="button" class="w-10 h-10 rounded-full bg-red-500/15 border border-red-500/40 text-red-300 hover:bg-red-500/25 hover:text-red-200 flex items-center justify-center transition-colors" aria-label="Delete chat">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 6h18"></path>
            <path d="M8 6V4h8v2"></path>
            <path d="M6 6l1 14h10l1-14"></path>
            <path d="M10 10v6"></path>
            <path d="M14 10v6"></path>
          </svg>
        </button>
      </div>
    </header>

    <section id="messages" class="flex-1 overflow-y-auto p-6 space-y-3"></section>

    <form id="chat-form" class="p-4 border-t border-white/10 bg-[#150723]/60 flex gap-3">
      <input id="chat-input" type="text" placeholder="Type message..." class="flex-1 bg-black/40 border border-white/10 rounded-lg px-4 py-3 outline-none focus:border-brand-pink" />
      <button type="submit" class="px-5 py-3 rounded-lg bg-gradient-to-r from-brand-pink to-brand-purple font-bold">Send</button>
    </form>
  </main>

  <div id="delete-modal" class="fixed inset-0 z-50 hidden">
    <div class="delete-overlay absolute inset-0 bg-black/70 backdrop-blur-sm"></div>
    <div class="relative z-10 h-full w-full flex items-center justify-center p-4">
      <div class="w-full max-w-md rounded-2xl border border-white/10 bg-[#150723] p-6 shadow-2xl">
        <div class="text-lg font-bold mb-2">Delete chat?</div>
        <div class="text-sm text-gray-400">Are you sure you want to delete this chat? This action cannot be undone.</div>
        <div class="mt-6 flex items-center justify-end gap-3">
          <button id="cancel-delete" type="button" class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 text-sm">No</button>
          <button id="confirm-delete" type="button" class="px-4 py-2 rounded-lg bg-red-500/20 hover:bg-red-500/30 border border-red-500/40 text-red-200 text-sm">Yes, delete</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.API_BASE || 'https://va-s-pilot-service-management-system-production-d6a0.up.railway.app';
    let selectedEmail = '';
    let allUsers = [];

    async function apiJson(path, options = {}) {
      const response = await fetch(`${API_BASE}${path}`, {
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        ...options
      });
      let data = {};
      try {
        data = await response.json();
      } catch (e) {
        data = {};
      }
      if (!response.ok || data.ok === false) {
        throw new Error(data.error || `Request failed (${response.status})`);
      }
      return data;
    }

    async function refreshUsers() {
      try {
        const payload = await apiJson('/api/users');
        const users = (payload.users || []).filter((u) => String(u.role || 'customer').toLowerCase() !== 'admin');
        allUsers = users;
        return users;
      } catch (err) {
        return allUsers;
      }
    }

    function renderThreadList() {
      const users = allUsers;
      const container = document.getElementById('thread-list');
      container.innerHTML = '';

      users.filter((u) => u.email).forEach((u) => {
        const email = String(u.email).trim().toLowerCase();
        const item = document.createElement('a');
        item.href = `admin-chat.html?email=${encodeURIComponent(email)}`;
        item.className = `block p-2 rounded-lg border ${email === selectedEmail ? 'bg-brand-purple/10 border-brand-purple/30' : 'bg-white/5 border-white/10 hover:border-white/20'}`;
        item.innerHTML = `
          <div class="text-sm font-semibold">${u.fullname || u.name || 'Customer'}</div>
          <div class="text-[11px] text-gray-400">${email}</div>
        `;
        container.appendChild(item);
      });
    }

    async function renderMessages() {
      const box = document.getElementById('messages');
      const nameEl = document.getElementById('chat-name');
      const emailEl = document.getElementById('chat-email');
      const avatarImg = document.getElementById('chat-avatar-img');
      const avatarFallback = document.getElementById('chat-avatar-fallback');
      const profileLink = document.getElementById('profile-link');
      const deleteBtn = document.getElementById('delete-chat-btn');
      const users = allUsers;
      const user = users.find((u) => String(u.email || '').trim().toLowerCase() === selectedEmail);
      const displayName = user ? (user.fullname || user.name || 'Customer') : 'No customer selected';
      nameEl.textContent = displayName;
      emailEl.textContent = user ? selectedEmail : 'Choose from inbox list';
      profileLink.href = `admin-customer-profile.html?email=${encodeURIComponent(selectedEmail || '')}`;
      if (user) {
        const initials = displayName
          .split(' ')
          .filter(Boolean)
          .slice(0, 2)
          .map((part) => part[0].toUpperCase())
          .join('');
        if (user.profileImage) {
          avatarImg.src = user.profileImage;
          avatarImg.classList.remove('hidden');
          avatarFallback.classList.add('hidden');
        } else {
          avatarImg.removeAttribute('src');
          avatarImg.classList.add('hidden');
          avatarFallback.textContent = initials || 'CU';
          avatarFallback.classList.remove('hidden');
        }
        profileLink.classList.remove('pointer-events-none', 'opacity-40');
        deleteBtn.classList.remove('pointer-events-none', 'opacity-40');
        deleteBtn.disabled = false;
      } else {
        avatarImg.removeAttribute('src');
        avatarImg.classList.add('hidden');
        avatarFallback.textContent = '?';
        avatarFallback.classList.remove('hidden');
        profileLink.classList.add('pointer-events-none', 'opacity-40');
        deleteBtn.classList.add('pointer-events-none', 'opacity-40');
        deleteBtn.disabled = true;
      }

      if (!selectedEmail) {
        box.innerHTML = '<p class="text-gray-500">Select a customer from the left panel.</p>';
        return;
      }

      try {
        const payload = await apiJson(`/api/messages?userEmail=${encodeURIComponent(selectedEmail)}&adminView=1`);
        const thread = payload.messages || [];
        if (!thread.length) {
          box.innerHTML = '<p class="text-gray-500">No messages yet.</p>';
          return;
        }

        box.innerHTML = '';
        thread.forEach((msg) => {
          const isAdmin = msg.sender === 'admin';
          const row = document.createElement('div');
          row.className = `flex ${isAdmin ? 'justify-end' : 'justify-start'}`;
          row.innerHTML = `
            <div class="max-w-[70%] px-4 py-2 rounded-lg ${isAdmin ? 'bg-brand-purple/20 border border-brand-purple/40' : 'bg-white/5 border border-white/10'}">
              <div class="text-sm">${msg.message || msg.text || ''}</div>
              <div class="text-[10px] text-gray-500 mt-1">${new Date(msg.createdAt || Date.now()).toLocaleString()}</div>
            </div>
          `;
          box.appendChild(row);
        });
        box.scrollTop = box.scrollHeight;
      } catch (err) {
        box.innerHTML = '<p class="text-red-400">Unable to load messages.</p>';
      }
    }

    function initSelectedEmail() {
      const params = new URLSearchParams(window.location.search);
      selectedEmail = String(params.get('email') || '').trim().toLowerCase();
    }

    document.getElementById('chat-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!selectedEmail) return;

      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;

      try {
        await apiJson('/api/messages', {
          method: 'POST',
          body: JSON.stringify({ userEmail: selectedEmail, sender: 'admin', message: text })
        });
        input.value = '';
        await renderMessages();
        renderThreadList();
      } catch (err) {
        alert(err.message || 'Unable to send message.');
      }
    });

    document.addEventListener('DOMContentLoaded', async () => {
      initSelectedEmail();
      await refreshUsers();
      renderThreadList();
      await renderMessages();
      setInterval(() => {
        if (selectedEmail) renderMessages();
      }, 3000);
    });

    const deleteModal = document.getElementById('delete-modal');
    const deleteBtn = document.getElementById('delete-chat-btn');
    const cancelDelete = document.getElementById('cancel-delete');
    const confirmDelete = document.getElementById('confirm-delete');

    function openDeleteModal() {
      if (!selectedEmail) return;
      deleteModal.classList.remove('hidden');
    }

    function closeDeleteModal() {
      deleteModal.classList.add('hidden');
    }

    deleteBtn.addEventListener('click', openDeleteModal);
    cancelDelete.addEventListener('click', closeDeleteModal);
    deleteModal.addEventListener('click', (event) => {
      if (event.target.classList.contains('delete-overlay')) closeDeleteModal();
    });

    confirmDelete.addEventListener('click', async () => {
      if (!selectedEmail) return;
      try {
        await apiJson(`/api/messages?userEmail=${encodeURIComponent(selectedEmail)}&adminOnly=1`, {
          method: 'DELETE'
        });
        window.location.href = 'admin-inbox.html';
      } catch (err) {
        alert(err.message || 'Unable to delete chat.');
      }
    });
  </script>
    <script src="sidebar-active.js"></script>
</body>
