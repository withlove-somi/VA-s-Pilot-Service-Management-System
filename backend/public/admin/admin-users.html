  <main class="flex-1 overflow-y-auto p-6 md:p-10 z-10">
    <div class="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-4 mb-6">
      <div>
        <h1 class="text-3xl font-bold mb-2">Customer Directory</h1>
        <p class="text-gray-400">All customers registered in the system. Click a card to view the profile.</p>
      </div>
      <div class="flex flex-col md:flex-row items-stretch md:items-center gap-3">
        <input id="user-search" type="text" placeholder="Search name or email..." class="w-full md:w-64 bg-black/40 border border-white/10 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-brand-pink">
        <div class="relative w-full md:w-56">
          <button id="filter-toggle" type="button" class="w-full bg-black/40 border border-white/10 rounded-lg px-3 py-2 text-sm text-white flex items-center justify-between focus:outline-none focus:border-brand-pink">
            <span id="filter-label">Filters</span>
            <svg class="w-4 h-4 text-gray-400" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 10.94l3.71-3.71a.75.75 0 111.06 1.06l-4.24 4.24a.75.75 0 01-1.06 0L5.21 8.29a.75.75 0 01.02-1.08z" clip-rule="evenodd" />
            </svg>
          </button>
          <div id="filter-menu" class="hidden absolute right-0 mt-2 w-full bg-[#150723] border border-white/10 rounded-lg shadow-xl p-3 z-20">
            <label class="flex items-center gap-2 text-sm text-gray-200 mb-2">
              <input type="checkbox" class="filter-check accent-brand-pink w-4 h-4" value="verified">
              Verified
            </label>
            <label class="flex items-center gap-2 text-sm text-gray-200 mb-2">
              <input type="checkbox" class="filter-check accent-brand-pink w-4 h-4" value="unverified">
              Unverified
            </label>
            <label class="flex items-center gap-2 text-sm text-gray-200 mb-2">
              <input type="checkbox" class="filter-check accent-brand-pink w-4 h-4" value="flag1">
              1st Flag
            </label>
            <label class="flex items-center gap-2 text-sm text-gray-200 mb-2">
              <input type="checkbox" class="filter-check accent-brand-pink w-4 h-4" value="flag2">
              2nd Flag
            </label>
            <label class="flex items-center gap-2 text-sm text-gray-200 mb-2">
              <input type="checkbox" class="filter-check accent-brand-pink w-4 h-4" value="flag3">
              3rd Flag
            </label>
            <label class="flex items-center gap-2 text-sm text-gray-200">
              <input type="checkbox" class="filter-check accent-brand-pink w-4 h-4" value="banned">
              Banned Accounts
            </label>
          </div>
        </div>
      </div>
    </div>
    <div id="users" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
  </main>

  <script>
    const API_BASE = window.API_BASE || 'https://va-s-pilot-service-management-system-production-d6a0.up.railway.app';

    async function apiJson(path, options = {}) {
      const response = await fetch(`${API_BASE}${path}`, {
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        ...options
      });
      let data = {};
      try {
        data = await response.json();
      } catch (e) {
        data = {};
      }
      if (!response.ok || data.ok === false) {
        throw new Error(data.error || `Request failed (${response.status})`);
      }
      return data;
    }

    let allUsers = [];

    function applyFilters() {
      const container = document.getElementById('users');
      const query = String(document.getElementById('user-search').value || '').trim().toLowerCase();
      const selectedFilters = Array.from(document.querySelectorAll('.filter-check:checked')).map((el) => el.value);

      const filtered = allUsers.filter((u) => {
        const email = String(u.email || '').trim().toLowerCase();
        const name = (u.fullname || u.name || 'Customer').trim();
        const nameLower = name.toLowerCase();
        const banned = Boolean(u.banned);
        const verified = Boolean(u.verified);
        const warningLevel = Number(u.warningLevel || 0);

        if (selectedFilters.length) {
          const matchesFilter =
            (selectedFilters.includes('verified') && verified) ||
            (selectedFilters.includes('unverified') && !verified) ||
            (selectedFilters.includes('flag1') && warningLevel === 1) ||
            (selectedFilters.includes('flag2') && warningLevel === 2) ||
            (selectedFilters.includes('flag3') && warningLevel === 3) ||
            (selectedFilters.includes('banned') && banned);
          if (!matchesFilter) return false;
        }

        if (query) {
          return nameLower.includes(query) || email.includes(query);
        }
        return true;
      });

      if (!filtered.length) {
        container.innerHTML = '<div class="p-8 rounded-xl border border-white/10 bg-black/30 text-gray-400 md:col-span-2">No customers found.</div>';
        return;
      }

      const sorted = filtered.slice().sort((a, b) => {
        const aBanned = Boolean(a.banned);
        const bBanned = Boolean(b.banned);
        if (aBanned !== bBanned) return aBanned ? 1 : -1;
        const aName = (a.fullname || a.name || '').toLowerCase();
        const bName = (b.fullname || b.name || '').toLowerCase();
        return aName.localeCompare(bName);
      });

      container.innerHTML = '';
      sorted.forEach((u) => {
        const email = String(u.email || '').trim().toLowerCase();
        const name = (u.fullname || u.name || 'Customer').trim();
        const initials = name
          .split(' ')
          .filter(Boolean)
          .slice(0, 2)
          .map((part) => part[0].toUpperCase())
          .join('');
        const avatarContent = u.profileImage
          ? `<img src="${u.profileImage}" alt="${name} profile photo" class="w-full h-full object-cover">`
          : `<span class="text-brand-purple font-bold">${initials || 'CU'}</span>`;

        const card = document.createElement('a');
        card.href = `admin-customer-profile.html?email=${encodeURIComponent(email)}`;
        card.className = 'bg-black/40 border border-white/10 rounded-2xl p-5 hover:border-brand-pink/40 hover:bg-white/5 transition-all flex items-center justify-between gap-4';
        card.innerHTML = `
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-full bg-brand-purple/20 border border-brand-purple/40 flex items-center justify-center overflow-hidden">
              ${avatarContent}
            </div>
            <div>
              <div class="font-bold text-lg">${name}</div>
              <div class="text-sm text-gray-400">${email}</div>
            </div>
          </div>
          <span class="px-2 py-1 rounded text-xs font-bold ${u.verified ? 'bg-green-500/10 text-green-400 border border-green-500/20' : 'bg-yellow-500/10 text-yellow-400 border border-yellow-500/20'}">${u.verified ? 'Verified' : 'Unverified'}</span>
        `;
        container.appendChild(card);
      });
    }

    async function renderUsers() {
      const container = document.getElementById('users');
      let users = [];
      try {
        const payload = await apiJson('/api/users');
        users = payload.users || [];
      } catch (err) {
        container.innerHTML = `<div class="p-8 rounded-xl border border-red-500/20 bg-black/30 text-red-300 md:col-span-2">Unable to load users: ${err.message || 'Request failed'}</div>`;
        return;
      }

      const validUsers = users.filter((u) => {
        const email = String(u.email || '').trim();
        const role = String(u.role || 'customer').toLowerCase();
        return email && role !== 'admin';
      });

      allUsers = validUsers;
      applyFilters();
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderUsers();
      document.getElementById('user-search').addEventListener('input', applyFilters);
      document.querySelectorAll('.filter-check').forEach((box) => {
        box.addEventListener('change', () => {
          updateFilterLabel();
          applyFilters();
        });
      });

      const filterToggle = document.getElementById('filter-toggle');
      const filterMenu = document.getElementById('filter-menu');

      filterToggle.addEventListener('click', () => {
        filterMenu.classList.toggle('hidden');
      });

      document.addEventListener('click', (event) => {
        if (!filterMenu.contains(event.target) && !filterToggle.contains(event.target)) {
          filterMenu.classList.add('hidden');
        }
      });

      updateFilterLabel();
    });

    function updateFilterLabel() {
      const label = document.getElementById('filter-label');
      const selected = Array.from(document.querySelectorAll('.filter-check:checked'));
      if (!selected.length) {
        label.textContent = 'Filters';
        return;
      }
      const names = selected.map((el) => el.parentElement.textContent.trim());
      label.textContent = names.length <= 2 ? names.join(', ') : `${names.length} selected`;
    }
  </script>
  <script src="sidebar-active.js"></script>
</body>
