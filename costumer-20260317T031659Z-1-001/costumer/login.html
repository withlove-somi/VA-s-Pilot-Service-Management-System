<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | VA Pilot Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
                    },
                    colors: {
                        'brand-bg': '#0f0518',
                        'brand-pink': '#e000ff',
                        'brand-purple': '#7a00ff',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-bg text-white font-sans antialiased selection:bg-brand-pink selection:text-white h-screen flex items-center justify-center relative overflow-hidden">

    <div class="absolute inset-0 bg-[linear-gradient(to_right,#ffffff05_1px,transparent_1px),linear-gradient(to_bottom,#ffffff05_1px,transparent_1px)] bg-[size:40px_40px] pointer-events-none z-0"></div>
    
    <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-brand-purple/20 rounded-full mix-blend-screen filter blur-[120px] pointer-events-none z-0 animate-pulse"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[400px] h-[400px] bg-brand-pink/20 rounded-full mix-blend-screen filter blur-[100px] pointer-events-none z-0"></div>

    <a href="../index.html" class="absolute top-8 left-8 z-20 text-gray-400 hover:text-brand-pink transition-colors flex items-center gap-2 text-sm font-medium">
        <span>←</span> Return to Base
    </a>

    <div class="w-full max-w-md relative z-10 px-6">
        
        <div class="bg-[#150723]/80 backdrop-blur-xl border border-white/10 p-10 rounded-3xl shadow-[0_0_50px_rgba(0,0,0,0.5)]">
            
            <div class="text-center mb-10">
                <div class="flex items-center justify-center gap-2 mb-4">
                    <span class="text-brand-pink text-3xl font-bold leading-none">VA</span>
                    <span class="text-white text-lg font-bold tracking-widest mt-1">PILOT SERVICE</span>
                </div>
                <h1 class="text-2xl font-bold tracking-tight">Secure Authorization</h1>
                <p class="text-xs text-brand-purple font-mono mt-2 tracking-widest uppercase flex items-center justify-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                    Encrypted Connection
                </p>
            </div>

            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-2 uppercase tracking-wider">Email</label>
                    <div class="relative">
                        <input type="email" id="email" required placeholder="commander@domain.com" class="w-full bg-black/40 border border-white/10 rounded-xl pl-4 pr-10 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-brand-pink focus:ring-1 focus:ring-brand-pink transition-all">
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500">✉</span>
                    </div>
                </div>

                <div>
                  <div class="flex justify-between items-center mb-2">
                      <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider">Password</label>
                      <a href="forgot-password.html" class="text-xs text-brand-purple hover:text-brand-pink transition-colors">Forgot Password?</a>
                  </div>
                  <div class="relative">
                      <input type="password" id="passcode" required placeholder="••••••••••••" class="w-full bg-black/40 border border-white/10 rounded-xl pl-4 pr-10 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-brand-pink focus:ring-1 focus:ring-brand-pink transition-all">
                        
                      <button type="button" id="toggle-password" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white transition-colors focus:outline-none">
                          <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                          </svg>
                      </button>
                  </div>
                </div>

                <p id="error-msg" class="text-red-500 text-xs text-center hidden font-medium bg-red-500/10 py-2 rounded-lg border border-red-500/20"></p>

                <button type="submit" class="flex items-center justify-center block w-full bg-gradient-to-r from-brand-pink to-brand-purple hover:from-fuchsia-500 hover:to-purple-500 text-white font-bold py-4 rounded-xl transition-all shadow-[0_0_15px_rgba(224,0,255,0.3)] hover:shadow-[0_0_25px_rgba(224,0,255,0.6)] hover:-translate-y-0.5 mt-4 tracking-widest text-sm">
                    LOGIN
                </button>
            </form>

            <div class="mt-8 text-center text-sm text-gray-400 border-t border-white/5 pt-6">
                No account yet?
                <a href="register.html" class="text-brand-pink hover:text-white font-semibold transition-colors">Create Account</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:5000';

        async function apiJson(path, options = {}) {
            const response = await fetch(`${API_BASE}${path}`, {
                headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
                ...options
            });
            let data = {};
            try {
                data = await response.json();
            } catch (e) {
                data = {};
            }
            if (!response.ok || data.ok === false) {
                throw new Error(data.error || `Request failed (${response.status})`);
            }
            return data;
        }

        // Password Toggle Logic
        const togglePasswordBtn = document.getElementById('toggle-password');
        const passcodeInput = document.getElementById('passcode');
        const eyeIcon = document.getElementById('eye-icon');

        togglePasswordBtn.addEventListener('click', () => {
            const isPassword = passcodeInput.getAttribute('type') === 'password';
            passcodeInput.setAttribute('type', isPassword ? 'text' : 'password');
            
            if (isPassword) {
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />`;
                togglePasswordBtn.classList.add('text-brand-pink');
                togglePasswordBtn.classList.remove('text-gray-500');
            } else {
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />`;
                togglePasswordBtn.classList.remove('text-brand-pink');
                togglePasswordBtn.classList.add('text-gray-500');
            }
        });

        // Login Authentication Logic
        const loginForm = document.getElementById('login-form');
        const emailInput = document.getElementById('email');
        const errorMsg = document.getElementById('error-msg');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.add('hidden');
            
            const email = emailInput.value.trim().toLowerCase();
            const password = passcodeInput.value;
            try {
                const payload = await apiJson('/api/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ email, password })
                });
                const user = payload.user || {};
                localStorage.setItem('va_pilot_current_user', JSON.stringify(user));

                // Keep local mirror for pages still using localStorage arrays.
                const users = JSON.parse(localStorage.getItem('va_pilot_users')) || [];
                const filtered = users.filter((u) => String(u.email || '').trim().toLowerCase() !== email);
                filtered.push({
                    ...user,
                    fullname: user.fullname || user.name || '',
                    password
                });
                localStorage.setItem('va_pilot_users', JSON.stringify(filtered));

                window.location.href = 'dashboard.html';
            } catch (err) {
                errorMsg.textContent = err.message || "Invalid email or password. Access Denied.";
                errorMsg.classList.remove('hidden');
                loginForm.classList.add('animate-pulse');
                setTimeout(() => loginForm.classList.remove('animate-pulse'), 500);
            }
        });
    </script>
    <script src="chat-widget.js"></script>
</body>
</html>
